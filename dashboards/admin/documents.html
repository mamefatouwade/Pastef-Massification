<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Documents — PASTEF Admin</title>
<link rel="icon" type="image/jpeg" href="../../assets/logo.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="../../styles/components.css" />
<link rel="stylesheet" href="../../styles/sidebar.css" />

<style>
  /* ============================================
     Documents — Styles spécifiques
     ============================================ */

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
  .kpi-green::before { background: var(--pastef-green); }
  .kpi-or::before    { background: var(--pastef-or); }
  .kpi-red::before   { background: var(--pastef-red); }
  .kpi-ink::before   { background: var(--ink); }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -0.5px; }
  .kpi-sub   { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Header actions */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    height: 38px;
    min-width: 240px;
  }

  .search-box svg { flex-shrink: 0; color: var(--text-muted); }

  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    width: 100%;
  }

  .search-box:focus-within {
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .filter-select {
    height: 38px;
    padding: 0 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7B72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 30px;
  }

  .filter-select:focus {
    outline: none;
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  /* Bouton upload */
  .btn-upload {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 38px;
    padding: 0 16px;
    background: var(--pastef-green);
    color: #fff;
    border: 2px solid var(--pastef-green-dark);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-upload:hover {
    background: var(--pastef-green-dark);
    border-color: var(--pastef-green-dark);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(27,124,61,0.2);
  }

  /* Table documents */
  .document-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .document-table thead tr { border-bottom: 1px solid var(--border); background: var(--bg-soft); }
  .document-table th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .document-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  .document-table tr:last-child td { border-bottom: none; }
  .document-table tr:hover td { background: var(--bg-soft); }

  .doc-name { font-weight: 600; color: var(--ink); }
  .doc-info { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .doc-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .doc-type-pdf { background: #FFE5E5; }
  .doc-type-doc { background: #E5F3FF; }
  .doc-type-xls { background: #E5FFE5; }
  .doc-type-img { background: #FFF5E5; }
  .doc-type-other { background: var(--bg); }

  .doc-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .badge-or     { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .badge-public { background: rgba(27,124,61,0.15); color: var(--pastef-green-dark); }
  .badge-restricted { background: rgba(253,185,19,0.15); color: #D97706; }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .doc-actions { display: flex; gap: 4px; }
  .doc-actions button {
    width: 30px; height: 30px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s; border: none; background: transparent; cursor: pointer;
  }
  .doc-actions button:hover { background: var(--bg); color: var(--pastef-green); }
  .doc-actions button.danger:hover { color: var(--pastef-red); }

  .doc-date { font-size: 11px; color: var(--text-muted); }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(15,26,20,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-light);
  }

  .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s; border: none; background: transparent; cursor: pointer;
  }
  .modal-close:hover { background: var(--bg); color: var(--ink); }

  .modal-body { padding: 20px 24px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border-light);
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-soft);
  }

  .upload-zone:hover {
    border-color: var(--pastef-green);
    background: var(--pastef-green-soft);
  }

  .upload-zone.dragover {
    border-color: var(--pastef-green);
    background: var(--pastef-green-soft);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.1);
  }

  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .upload-hint { font-size: 11px; color: var(--text-muted); }

  /* Form fields */
  .field { margin-bottom: 18px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
  .field-hint  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .field-input, .field-select {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    transition: border-color 0.15s;
  }

  .field-input:focus, .field-select:focus {
    outline: none;
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .field-select { appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7B72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center;
    padding-right: 30px;
  }

  /* Checkboxes */
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  
  .checkbox-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }

  .checkbox-item:hover { background: var(--bg-soft); border-color: var(--pastef-green); }

  .checkbox-item input { margin-right: 8px; cursor: pointer; }
  .checkbox-item label { flex: 1; cursor: pointer; font-size: 13px; }
  .checkbox-item .role-info { font-size: 11px; color: var(--text-muted); }

  /* Buttons */
  .btn {
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--pastef-green);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--pastef-green-dark);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--bg-soft);
    border-color: var(--text-muted);
  }

  .btn-danger {
    background: var(--pastef-red-soft);
    color: var(--pastef-red);
  }

  .btn-danger:hover {
    background: var(--pastef-red);
    color: #fff;
  }

  .btn-sm {
    padding: 7px 12px;
    font-size: 12px;
  }

  /* Empty state */
  .empty-search {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* Responsive */
  @media (max-width: 768px) {
    .modal { max-width: 100%; margin: 10px; }
    .search-box { min-width: 160px; }
    .page-header { flex-direction: column; align-items: stretch; }
  }

  @media (max-width: 480px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="page-loader"><div class="spinner"></div>Chargement des documents…</div>
    </div>
  </div>
</div>

<!-- Modal upload document -->
<div class="modal-overlay" id="modalUploadOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Uploader un document</div>
      <button class="modal-close" onclick="closeUploadModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">Fichier</label>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">📄</div>
          <div class="upload-text">Glissez-déposez votre fichier ici</div>
          <div class="upload-hint">ou cliquez pour sélectionner (max 10 MB)</div>
        </div>
        <input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)" />
        <div id="fileName" style="font-size:12px;color:var(--text-muted);margin-top:8px;"></div>
      </div>

      <div class="field">
        <label class="field-label">Titre du document</label>
        <input class="field-input" type="text" id="docTitle" placeholder="Ex: Cahier des charges PASTEF 2026" />
      </div>

      <div class="field">
        <label class="field-label">Description (optionnel)</label>
        <textarea class="field-input" id="docDesc" style="height:80px;resize:vertical;font-family:inherit;padding:12px;" placeholder="Contexte, contenu, utilité…"></textarea>
      </div>

      <div class="field">
        <label class="field-label">Visibilité</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="radio" name="visibility" value="public" checked onchange="updateVisibility()" />
            <div>
              <label style="font-weight:600;">Public</label>
              <div class="role-info">Accessible à tous les coordinateurs</div>
            </div>
          </label>
          <label class="checkbox-item">
            <input type="radio" name="visibility" value="restricted" onchange="updateVisibility()" />
            <div>
              <label style="font-weight:600;">Restreint</label>
              <div class="role-info">À partager manuellement</div>
            </div>
          </label>
          <label class="checkbox-item">
            <input type="radio" name="visibility" value="private" onchange="updateVisibility()" />
            <div>
              <label style="font-weight:600;">Privé</label>
              <div class="role-info">Visible uniquement par l'admin</div>
            </div>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeUploadModal()">Annuler</button>
      <button class="btn btn-primary btn-sm" onclick="confirmerUpload()" id="btnConfirmUpload" disabled>
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Uploader
      </button>
    </div>
  </div>
</div>

<!-- Modal partage document -->
<div class="modal-overlay" id="modalShareOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Partager le document</div>
      <button class="modal-close" onclick="closeShareModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="shareContent">
      <!-- Contenu dynamique -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeShareModal()">Annuler</button>
      <button class="btn btn-primary btn-sm" onclick="confirmerPartage()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Confirmer partage
      </button>
    </div>
  </div>
</div>

<script src="../../js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../js/data.js"></script>
<script src="../../shared/supabase-client.js"></script>
<script src="../../shared/utils.js"></script>
<script src="../../shared/auth.js"></script>
<script src="../../shared/sidebar.js"></script>
<script src="../../shared/topbar.js"></script>

<script>
(async function () {
  'use strict';

  const session = await PASTEF.auth.requireAuth(['admin']);
  if (!session) return;

  PASTEF.sidebar.render(session, 'documents');
  PASTEF.topbar.render({ session, title: 'Documents', breadcrumb: 'Bibliothèque documentaire' });

  /* ============================================
     DONNÉES MOCK
     ============================================ */
  const DOCUMENTS = [
    {
      id: 'd1',
      titre: 'Cahier des charges PASTEF 2026',
      description: 'Vision et stratégies de PASTEF pour 2026',
      type: 'pdf',
      taille: '2.4 MB',
      createur: 'Admin Principal',
      date_upload: '2026-06-15',
      visibilite: 'public',
      file_url: '#'
    },
    {
      id: 'd2',
      titre: 'Organigramme des coordinateurs',
      description: 'Structure hiérarchique complète avec contacts',
      type: 'doc',
      taille: '1.1 MB',
      createur: 'Admin Principal',
      date_upload: '2026-06-10',
      visibilite: 'public',
      file_url: '#'
    },
    {
      id: 'd3',
      titre: 'Budget alloué par région',
      description: 'Tableau détaillé des allocations mensuelles',
      type: 'xls',
      taille: '856 KB',
      createur: 'Admin Principal',
      date_upload: '2026-06-08',
      visibilite: 'restricted',
      file_url: '#'
    },
    {
      id: 'd4',
      titre: 'Logo PASTEF - Haute résolution',
      description: 'Fichier officiel pour communications',
      type: 'img',
      taille: '3.2 MB',
      createur: 'Admin Principal',
      date_upload: '2026-06-05',
      visibilite: 'public',
      file_url: '#'
    },
    {
      id: 'd5',
      titre: 'Modèle de rapport mensuel',
      description: 'Template à utiliser par les coordinateurs',
      type: 'doc',
      taille: '542 KB',
      createur: 'Admin Principal',
      date_upload: '2026-06-01',
      visibilite: 'public',
      file_url: '#'
    },
    {
      id: 'd6',
      titre: 'Directives confidentielles - Juin',
      description: 'Instructions stratégiques du mois',
      type: 'pdf',
      taille: '768 KB',
      createur: 'Admin Principal',
      date_upload: '2026-05-28',
      visibilite: 'private',
      file_url: '#'
    },
    {
      id: 'd7',
      titre: 'Stratégie communication digitale',
      description: 'Plan détaillé pour réseaux sociaux',
      type: 'doc',
      taille: '1.8 MB',
      createur: 'Admin Principal',
      date_upload: '2026-05-20',
      visibilite: 'restricted',
      file_url: '#'
    },
  ];

  /* ============================================
     STATS
     ============================================ */
  const stats = {
    total: DOCUMENTS.length,
    public: DOCUMENTS.filter(d => d.visibilite === 'public').length,
    restricted: DOCUMENTS.filter(d => d.visibilite === 'restricted').length,
    private: DOCUMENTS.filter(d => d.visibilite === 'private').length,
    tailleTotale: '11.7 MB'
  };

  /* ============================================
     RENDER PAGE
     ============================================ */
  function getFileIcon(type) {
    const icons = { pdf: '📕', doc: '📘', xls: '📗', img: '🖼️' };
    return icons[type] || '📄';
  }

  function getFileClass(type) {
    const classes = { pdf: 'doc-type-pdf', doc: 'doc-type-doc', xls: 'doc-type-xls', img: 'doc-type-img' };
    return classes[type] || 'doc-type-other';
  }

  function visibilityBadge(vis) {
    if (vis === 'public') return `<span class="badge badge-public"><span class="badge-dot"></span>Public</span>`;
    if (vis === 'restricted') return `<span class="badge badge-restricted"><span class="badge-dot"></span>Restreint</span>`;
    return `<span class="badge badge-neutral"><span class="badge-dot"></span>Privé</span>`;
  }

  function dateFormat(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: '2-digit' });
  }

  function renderTable(data) {
    return data.map(doc => `
      <tr data-id="${doc.id}">
        <td>
          <div class="doc-cell">
            <div class="doc-icon ${getFileClass(doc.type)}">${getFileIcon(doc.type)}</div>
            <div>
              <div class="doc-name">${doc.titre}</div>
              <div class="doc-info">${doc.description}</div>
            </div>
          </div>
        </td>
        <td>${doc.type.toUpperCase()}</td>
        <td>${doc.taille}</td>
        <td>${visibilityBadge(doc.visibilite)}</td>
        <td><span class="doc-date">${dateFormat(doc.date_upload)}</span></td>
        <td>
          <div class="doc-actions">
            <button title="Télécharger" onclick="telecharger('${doc.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button title="Partager" onclick="openShare('${doc.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
            <button title="Supprimer" class="danger" onclick="supprimerDoc('${doc.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="kpi-strip">
      <div class="kpi kpi-green">
        <div class="kpi-label">Total documents</div>
        <div class="kpi-value">${stats.total}</div>
        <div class="kpi-sub">${stats.tailleTotale} stockés</div>
      </div>
      <div class="kpi kpi-green">
        <div class="kpi-label">Documents publics</div>
        <div class="kpi-value">${stats.public}</div>
      </div>
      <div class="kpi kpi-or">
        <div class="kpi-label">Restreints</div>
        <div class="kpi-value">${stats.restricted}</div>
      </div>
      <div class="kpi kpi-red">
        <div class="kpi-label">Privés</div>
        <div class="kpi-value">${stats.private}</div>
      </div>
    </div>

    <div class="page-header">
      <div class="page-header-left">
        <div class="search-box">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchDoc" placeholder="Chercher un document…" oninput="filterDocuments(this.value)" />
        </div>
        <select class="filter-select" onchange="filterType(this.value)">
          <option value="">Tous les types</option>
          <option value="pdf">PDF</option>
          <option value="doc">Word/Doc</option>
          <option value="xls">Excel/Calc</option>
          <option value="img">Images</option>
        </select>
        <select class="filter-select" onchange="filterVisibility(this.value)">
          <option value="">Toutes les visibilités</option>
          <option value="public">Public</option>
          <option value="restricted">Restreint</option>
          <option value="private">Privé</option>
        </select>
      </div>
      <button class="btn-upload" onclick="openUploadModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Uploader un document
      </button>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <div style="overflow-x:auto;">
        <table class="document-table">
          <thead>
            <tr>
              <th>Document</th>
              <th>Type</th>
              <th>Taille</th>
              <th>Visibilité</th>
              <th>Date</th>
              <th style="width:100px;"></th>
            </tr>
          </thead>
          <tbody id="docBody">${renderTable(DOCUMENTS)}</tbody>
        </table>
      </div>
    </div>
  `;

  /* ============================================
     FILTRAGE
     ============================================ */
  let currentFilter = '';
  let currentType = '';
  let currentVisibility = '';

  window.filterDocuments = function (q) {
    currentFilter = q.toLowerCase();
    applyFilters();
  };

  window.filterType = function (type) {
    currentType = type;
    applyFilters();
  };

  window.filterVisibility = function (vis) {
    currentVisibility = vis;
    applyFilters();
  };

  function applyFilters() {
    let data = DOCUMENTS;
    if (currentType) data = data.filter(d => d.type === currentType);
    if (currentVisibility) data = data.filter(d => d.visibilite === currentVisibility);
    if (currentFilter) data = data.filter(d =>
      d.titre.toLowerCase().includes(currentFilter) ||
      d.description.toLowerCase().includes(currentFilter)
    );
    document.getElementById('docBody').innerHTML = data.length
      ? renderTable(data)
      : '<tr><td colspan="6" class="empty-search"><div class="empty-icon">📭</div>Aucun document trouvé</td></tr>';
  }

  /* ============================================
     UPLOAD MODAL
     ============================================ */
  let uploadFile = null;

  window.openUploadModal = function () {
    uploadFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileName').textContent = '';
    document.getElementById('docTitle').value = '';
    document.getElementById('docDesc').value = '';
    document.querySelector('input[name="visibility"][value="public"]').checked = true;
    document.getElementById('btnConfirmUpload').disabled = true;
    document.getElementById('modalUploadOverlay').classList.add('open');
  };

  window.closeUploadModal = function () {
    document.getElementById('modalUploadOverlay').classList.remove('open');
  };

  document.getElementById('modalUploadOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalUploadOverlay')) closeUploadModal();
  });

  // Drag and drop
  const uploadZone = document.getElementById('uploadZone');
  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
  });

  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      handleFile(files[0]);
    }
  });

  window.handleFileSelect = function (event) {
    if (event.target.files.length > 0) {
      handleFile(event.target.files[0]);
    }
  };

  function handleFile(file) {
    uploadFile = file;
    const sizeMB = (file.size / 1024 / 1024).toFixed(1);
    document.getElementById('fileName').textContent = `✅ ${file.name} (${sizeMB} MB)`;
    document.getElementById('btnConfirmUpload').disabled = false;
  }

  window.updateVisibility = function () {
    // Juste pour validation
  };

  window.confirmerUpload = function () {
    const titre = document.getElementById('docTitle').value.trim();
    if (!uploadFile || !titre) {
      alert('Veuillez sélectionner un fichier et entrer un titre');
      return;
    }

    const visibility = document.querySelector('input[name="visibility"]:checked').value;
    const desc = document.getElementById('docDesc').value.trim();

    // Ajouter le document
    const newDoc = {
      id: 'd' + Date.now(),
      titre: titre,
      description: desc || 'Sans description',
      type: uploadFile.name.split('.').pop().toLowerCase(),
      taille: ((uploadFile.size / 1024 / 1024).toFixed(1)) + ' MB',
      createur: 'Admin Principal',
      date_upload: new Date().toISOString().slice(0, 10),
      visibilite: visibility,
      file_url: '#'
    };

    DOCUMENTS.unshift(newDoc);
    applyFilters();
    closeUploadModal();
    alert(`✅ Document "${titre}" uploadé avec succès!\n\nTODO: Supabase Storage integration`);
  };

  /* ============================================
     PARTAGE MODAL
     ============================================ */
  let shareDocId = null;

  window.openShare = function (id) {
    shareDocId = id;
    const doc = DOCUMENTS.find(d => d.id === id);
    if (!doc) return;

    const rolesList = [
      { role: 'departemental', label: 'Coordinateurs Départementaux', checked: doc.visibilite === 'public' },
      { role: 'communal', label: 'Coordinateurs Communaux', checked: doc.visibilite === 'public' },
      { role: 'diaspora', label: 'Coordinateurs Diaspora', checked: doc.visibilite === 'public' }
    ];

    const shareContent = document.getElementById('shareContent');
    shareContent.innerHTML = `
      <div style="margin-bottom:16px;">
        <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;">Partagé avec :</div>
        <div style="padding:12px;background:var(--bg-soft);border-radius:var(--radius-sm);font-size:12px;color:var(--text);">
          ${doc.visibilite === 'public' ? '✅ Tous les coordinateurs (visibilité publique)' : doc.visibilite === 'private' ? '🔒 Personne (privé)' : '⚙️ Sélectionner ci-dessous'}
        </div>
      </div>

      <div class="field">
        <label class="field-label">Partager avec les rôles spécifiques</label>
        <div class="checkbox-group">
          ${rolesList.map(r => `
            <label class="checkbox-item">
              <input type="checkbox" name="roles" value="${r.role}" ${r.checked ? 'checked' : ''} />
              <label>${r.label}</label>
            </label>
          `).join('')}
        </div>
      </div>

      <div style="padding:12px;background:var(--pastef-or-soft);border-radius:var(--radius-sm);border-left:3px solid var(--pastef-or);font-size:11px;color:var(--pastef-or);">
        💡 Les documents publics sont visibles par tous. Les documents restreints demandent un partage manuel à chaque rôle.
      </div>
    `;

    document.getElementById('modalShareOverlay').classList.add('open');
  };

  window.closeShareModal = function () {
    document.getElementById('modalShareOverlay').classList.remove('open');
  };

  document.getElementById('modalShareOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalShareOverlay')) closeShareModal();
  });

  window.confirmerPartage = function () {
    const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(c => c.value);
    alert(`✅ Document partagé avec:\n${roles.join(', ') || 'Aucun rôle sélectionné'}\n\nTODO: Mettre à jour les permissions dans Supabase`);
    closeShareModal();
  };

  /* ============================================
     ACTIONS
     ============================================ */
  window.telecharger = function (id) {
    const doc = DOCUMENTS.find(d => d.id === id);
    if (!doc) return;
    alert(`Téléchargement de "${doc.titre}"\n\nTODO: Supabase Storage download`);
  };

  window.supprimerDoc = function (id) {
    const doc = DOCUMENTS.find(d => d.id === id);
    if (!doc) return;

    if (confirm(`Êtes-vous sûr de vouloir supprimer "${doc.titre}" ?\n\nCette action est définitive.`)) {
      const idx = DOCUMENTS.indexOf(doc);
      if (idx > -1) DOCUMENTS.splice(idx, 1);
      applyFilters();
      alert(`✅ Document "${doc.titre}" supprimé`);
    }
  };

})();
</script>

</body>
</html>
