<style>
  /* ============================================
     Statistiques comparatives — Styles
     ============================================ */

  /* Filtres */
  .filters-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filter-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-pill:hover { border-color: var(--pastef-green); color: var(--pastef-green); }
  .filter-pill.active { background: var(--pastef-green); color: #fff; border-color: var(--pastef-green); }

  .filter-select {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    appearance: none;
    padding-right: 28px;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7B72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }

  .filter-select:focus { border-color: var(--pastef-green); outline: none; }

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
  }

  .kpi-green::before { background: var(--pastef-green); }
  .kpi-or::before    { background: var(--pastef-or); }
  .kpi-red::before   { background: var(--pastef-red); }
  .kpi-ink::before   { background: var(--ink); }

  .kpi-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .kpi-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.5px;
  }

  .kpi-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .kpi-trend {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .kpi-trend.up   { background: var(--pastef-green-soft); color: var(--pastef-green); }
  .kpi-trend.down { background: var(--pastef-red-soft); color: var(--pastef-red); }

  /* Section layout */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title svg {
    width: 16px;
    height: 16px;
    color: var(--pastef-green);
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .chart-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .chart-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
  }

  .chart-card-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--pastef-green-soft);
    color: var(--pastef-green);
  }

  .chart-wrapper {
    position: relative;
  }

  /* Tableau ranking */
  .rank-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12px;
  }

  .rank-table th {
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .rank-table th:last-child,
  .rank-table td:last-child { text-align: right; }

  .rank-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text);
    vertical-align: middle;
  }

  .rank-table tr:last-child td { border-bottom: none; }

  .rank-table tr:hover td { background: var(--bg-soft); }

  .rank-pos {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }

  .rank-1 { background: var(--pastef-green); color: #fff; }
  .rank-2 { background: var(--pastef-green-soft); color: var(--pastef-green); }
  .rank-3 { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .rank-default { background: var(--bg); color: var(--text-muted); }

  .rank-name {
    font-weight: 600;
    color: var(--ink);
  }

  .rank-bar-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rank-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .rank-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .rank-bar-value {
    font-weight: 700;
    font-size: 12px;
    min-width: 42px;
    text-align: right;
    color: var(--ink);
  }

  /* Donut center */
  .donut-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .donut-center {
    position: absolute;
    text-align: center;
  }

  .donut-center-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
  }

  .donut-center-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Tabs mini */
  .tab-bar {
    display: flex;
    gap: 2px;
    background: var(--bg);
    padding: 3px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
  }

  .tab-btn {
    flex: 1;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    border: none;
    background: transparent;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { background: var(--card); color: var(--pastef-green); box-shadow: var(--shadow-xs); }

  /* Full width card */
  .full-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
    .filters-bar { gap: 6px; }
  }
</style>

  function renderRegionRows(data, maxVal) {

      },
      scales: {
        x: { grid: { display: false }, ticks: tickStyle },
        y: { grid: gridStyle, ticks: { ...tickStyle, callback: v => v >= 1000 ? (v/1000) + 'k' : v }, beginAtZero: false },
      },
    },
  });

  // ─── Répartition Sénégal vs Diaspora ───
  new Chart(document.getElementById('chartRepartition'), {
    type: 'doughnut',
    data: {
      labels: ['Sénégal', 'Diaspora'],
      datasets: [{
        data: [totalSenegal, totalDiaspora],
        backgroundColor: ['#1B7C3D', '#E5E9E7'],
        borderWidth: 0,
        spacing: 3,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '72%',
      plugins: { legend: { display: false } },
    },
  });

  // ─── Genre par région (top 8) ───
  const top8 = REGIONS.slice().sort((a,b) => b.patriotes - a.patriotes).slice(0, 8);
  new Chart(document.getElementById('chartGenreRegion'), {
    type: 'bar',
    data: {
      labels: top8.map(r => r.nom),
      datasets: [
        { label: 'Hommes', data: top8.map(r => r.hommes), backgroundColor: '#1B7C3D', borderRadius: 3, barPercentage: 0.6 },
        { label: 'Femmes', data: top8.map(r => r.femmes), backgroundColor: '#D5E8D9', borderRadius: 3, barPercentage: 0.6 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { position: 'top', align: 'end', labels: { font: { size: 10, family: 'Inter', weight: 600 }, boxWidth: 8, boxHeight: 8, usePointStyle: true, padding: 10 } },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 11 }, titleFont: { family: 'Inter', size: 11, weight: 600 } },
      },
      scales: {
        x: { stacked: true, grid: gridStyle, ticks: { ...tickStyle, font: { size: 10, family: 'Inter' } } },
        y: { stacked: true, grid: { display: false }, ticks: { ...tickStyle, font: { size: 10, family: 'Inter', weight: 500 } } },
      },
    },
  });

  // ─── Tranches d'âge global (donut) ───
  const ages = {
    '18-25': [...REGIONS, ...DIASPORA].reduce((s,r) => s + r.age18_25, 0),
    '26-35': [...REGIONS, ...DIASPORA].reduce((s,r) => s + r.age26_35, 0),
    '36-50': [...REGIONS, ...DIASPORA].reduce((s,r) => s + r.age36_50, 0),
    '50+':   [...REGIONS, ...DIASPORA].reduce((s,r) => s + r.age50p, 0),
  };

  new Chart(document.getElementById('chartAgeGlobal'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(ages).map(k => k + ' ans'),
      datasets: [{
        data: Object.values(ages),
        backgroundColor: ['#2E9B52', '#1B7C3D', '#135A2C', '#9CA8A2'],
        borderWidth: 0,
        spacing: 2,
        borderRadius: 3,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 11, family: 'Inter', weight: 500 }, boxWidth: 10, boxHeight: 10, usePointStyle: true, padding: 12 },
        },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 11 }, titleFont: { family: 'Inter', size: 11, weight: 600 },
          callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw.toLocaleString('fr-FR')} (${Math.round(ctx.raw/totalGlobal*100)}%)` }
        },
      },
    },
  });

  // ─── Croissance par zone (bar horizontal) ───
  const allZones = [...REGIONS.map(r => ({ ...r, type: 'sn' })), ...DIASPORA.map(r => ({ ...r, type: 'di' }))];
  const topGrowth = allZones.sort((a,b) => b.growth - a.growth).slice(0, 10);

  new Chart(document.getElementById('chartGrowth'), {
    type: 'bar',
    data: {
      labels: topGrowth.map(r => (r.flag || '🇸🇳') + ' ' + r.nom),
      datasets: [{
        label: 'Croissance %',
        data: topGrowth.map(r => r.growth),
        backgroundColor: topGrowth.map(r => r.growth >= 8 ? '#1B7C3D' : r.growth >= 5 ? '#2E9B52' : '#D5E8D9'),
        borderRadius: 3,
        barPercentage: 0.65,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 11 }, titleFont: { family: 'Inter', size: 11, weight: 600 },
          callbacks: { label: ctx => ` +${ctx.raw}%` }
        },
      },
      scales: {
        x: { grid: gridStyle, ticks: { ...tickStyle, font: { size: 10, family: 'Inter' }, callback: v => '+' + v + '%' } },
        y: { grid: { display: false }, ticks: { ...tickStyle, font: { size: 10, family: 'Inter', weight: 500 } } },
      },
    },
  });

  // ─── Nouveaux patriotes par mois ───
  new Chart(document.getElementById('chartNouveaux'), {
    type: 'bar',
    data: {
      labels: EVOLUTION.labels,
      datasets: [{
        label: 'Nouveaux inscrits',
        data: EVOLUTION.nouveaux,
        backgroundColor: '#1B7C3D',
        borderRadius: 5,
        barPercentage: 0.5,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 12 }, titleFont: { family: 'Inter', size: 12, weight: 600 },
          callbacks: { label: ctx => ` ${ctx.raw.toLocaleString('fr-FR')} nouveaux patriotes` }
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: tickStyle },
        y: { grid: gridStyle, ticks: { ...tickStyle, callback: v => v >= 1000 ? (v/1000) + 'k' : v }, beginAtZero: true },
      },
    },
  });

  // ─── Top départements par score d'activité ───
  const deptScored = DEPARTEMENTS.map(d => ({ ...d, score: Math.round(scoreActivite(d)) })).sort((a,b) => b.score - a.score).slice(0, 10);

  new Chart(document.getElementById('chartDeptActivity'), {
    type: 'bar',
    data: {
      labels: deptScored.map(d => d.nom),
      datasets: [{
        label: 'Score',
        data: deptScored.map(d => d.score),
        backgroundColor: deptScored.map((d, i) => i < 3 ? '#1B7C3D' : i < 6 ? '#2E9B52' : '#D5E8D9'),
        borderRadius: 3,
        barPercentage: 0.6,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 11 }, titleFont: { family: 'Inter', size: 11, weight: 600 },
          callbacks: {
            afterLabel: ctx => {
              const d = deptScored[ctx.dataIndex];
              return `${d.activites} activités · ${d.rapports} rapports · +${d.nouveaux} nouveaux`;
            }
          }
        },
      },
      scales: {
        x: { grid: gridStyle, ticks: tickStyle },
        y: { grid: { display: false }, ticks: { ...tickStyle, font: { size: 11, family: 'Inter', weight: 500 } } },
      },
    },
  });

  // ─── Top communes par score d'activité ───
  const commScored = COMMUNES.map(c => ({ ...c, score: Math.round(scoreActivite(c)) })).sort((a,b) => b.score - a.score).slice(0, 10);

  new Chart(document.getElementById('chartCommActivity'), {
    type: 'bar',
    data: {
      labels: commScored.map(c => c.nom),
      datasets: [{
        label: 'Score',
        data: commScored.map(c => c.score),
        backgroundColor: commScored.map((c, i) => i < 3 ? '#1B7C3D' : i < 6 ? '#2E9B52' : '#D5E8D9'),
        borderRadius: 3,
        barPercentage: 0.6,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 11 }, titleFont: { family: 'Inter', size: 11, weight: 600 },
          callbacks: {
            afterLabel: ctx => {
              const c = commScored[ctx.dataIndex];
              return `${c.activites} activités · ${c.rapports} rapports · +${c.nouveaux} nouveaux`;
            }
          }
        },
      },
      scales: {
        x: { grid: gridStyle, ticks: tickStyle },
        y: { grid: { display: false }, ticks: { ...tickStyle, font: { size: 11, family: 'Inter', weight: 500 } } },
      },
    },
  });

  // ─── Comparatif activités : top 5 départements vs top 5 diaspora ───
  const topDept5 = DEPARTEMENTS.sort((a,b) => b.activites - a.activites).slice(0, 5);
  const topDia5  = DIASPORA.sort((a,b) => b.cellules - a.cellules).slice(0, 5).map(d => ({ ...d, activites: Math.round(d.cellules * 1.8) }));

  new Chart(document.getElementById('chartCompareAct'), {
    type: 'bar',
    data: {
      labels: [...topDept5.map(d => '🇸🇳 ' + d.nom), ...topDia5.map(d => d.flag + ' ' + d.nom)],
      datasets: [{
        label: 'Activités menées',
        data: [...topDept5.map(d => d.activites), ...topDia5.map(d => d.activites)],
        backgroundColor: [...topDept5.map(() => '#1B7C3D'), ...topDia5.map(() => '#D4900A')],
        borderRadius: 4,
        barPercentage: 0.55,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#fff', titleColor: '#0F1A14', bodyColor: '#6B7B72', borderColor: '#E5E9E7', borderWidth: 1, cornerRadius: 8, padding: 10, bodyFont: { family: 'Inter', size: 12 }, titleFont: { family: 'Inter', size: 12, weight: 600 },
          callbacks: { label: ctx => ` ${ctx.raw} activités` }
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { ...tickStyle, font: { size: 10, family: 'Inter' } } },
        y: { grid: gridStyle, ticks: tickStyle, beginAtZero: true },
      },
    },
  });

  /* ============================================
     6. FILTRE DÉPARTEMENT PAR RÉGION
     ============================================ */
  window.filterDeptByRegion = function (region) {
    const filtered = region ? DEPARTEMENTS.filter(d => d.region === region) : DEPARTEMENTS;
    document.getElementById('tbDept').innerHTML = renderActivityRows(filtered, 'dept');
  };

  /* ============================================
     6. INTERACTIONS FILTRES
     ============================================ */
  window.switchPeriod = function (btn, period) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    // TODO: recharger les données selon la période sélectionnée
  };

})();
</script>

</body>
</html>
