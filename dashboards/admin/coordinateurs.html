<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coordinateurs — PASTEF Admin</title>
<link rel="icon" type="image/jpeg" href="../../assets/logo.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="../../styles/components.css" />
<link rel="stylesheet" href="../../styles/sidebar.css" />

<style>
  /* ============================================
     Coordinateurs — Styles spécifiques
     ============================================ */

  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
  .kpi-green::before { background: var(--pastef-green); }
  .kpi-or::before    { background: var(--pastef-or); }
  .kpi-red::before   { background: var(--pastef-red); }
  .kpi-ink::before   { background: var(--ink); }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -0.5px; }
  .kpi-sub   { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    height: 38px;
    min-width: 240px;
  }

  .search-box svg { flex-shrink: 0; color: var(--text-muted); }

  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    width: 100%;
  }

  .search-box:focus-within {
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .btn-designate {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 38px;
    padding: 0 18px;
    background: var(--pastef-green);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-designate:hover { background: var(--pastef-green-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn-designate:disabled { opacity: 0.6; cursor: not-allowed; }

  .coord-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .coord-table thead tr { border-bottom: 1px solid var(--border); background: var(--bg-soft); }
  .coord-table th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .coord-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  .coord-table tr:last-child td { border-bottom: none; }
  .coord-table tr:hover td { background: var(--bg-soft); }

  .coord-name { font-weight: 600; color: var(--ink); }
  .coord-phone { font-size: 12px; color: var(--text-muted); margin-top: 1px; font-family: var(--font-mono); }
  .coord-lieu  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .coord-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }

  .avatar-green { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .avatar-or    { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .avatar-ink   { background: var(--bg); color: var(--text-muted); }

  .coord-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .badge-or     { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .badge-red    { background: var(--pastef-red-soft); color: var(--pastef-red); }
  .badge-neutral { background: var(--bg); color: var(--text-muted); }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .coord-actions { display: flex; gap: 4px; }
  .coord-actions button {
    width: 30px; height: 30px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .coord-actions button:hover { background: var(--bg); color: var(--pastef-green); }
  .coord-actions button.danger:hover { color: var(--pastef-red); }
  .coord-actions button:disabled { opacity: 0.4; cursor: wait; }

  .last-login { font-size: 11px; color: var(--text-muted); }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(15,26,20,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-light);
  }

  .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .modal-close:hover { background: var(--bg); color: var(--ink); }

  .modal-body { padding: 20px 24px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border-light);
  }

  .steps { display: flex; gap: 4px; margin-bottom: 24px; }

  .step {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border-light);
    transition: background 0.3s;
  }

  .step.done { background: var(--pastef-green); }
  .step.active { background: var(--pastef-green-light); }

  .field { margin-bottom: 18px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
  .field-hint  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .field-input, .field-select {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    transition: border-color 0.15s;
  }

  .field-input:focus, .field-select:focus {
    outline: none;
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .field-select { appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7B72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center;
    padding-right: 30px;
  }

  .field-select:disabled { opacity: 0.5; cursor: not-allowed; }

  .radio-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .radio-card {
    position: relative;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .radio-card:hover { border-color: var(--pastef-green); }

  .radio-card.selected {
    border-color: var(--pastef-green);
    background: var(--pastef-green-soft);
  }

  .radio-card input { position: absolute; opacity: 0; pointer-events: none; }

  .radio-card-icon { font-size: 20px; margin-bottom: 4px; }
  .radio-card-label { font-size: 12px; font-weight: 600; color: var(--ink); }
  .radio-card-desc  { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .search-results {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    max-height: 200px;
    overflow-y: auto;
    margin-top: 6px;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border-light);
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--pastef-green-soft); }
  .search-result-item.selected { background: var(--pastef-green-soft); border-left: 3px solid var(--pastef-green); }

  .search-result-name  { font-size: 13px; font-weight: 600; color: var(--ink); }
  .search-result-info  { font-size: 11px; color: var(--text-muted); }

  .creds-card {
    background: var(--pastef-green-soft);
    border: 1.5px solid var(--pastef-green);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }

  .creds-icon { font-size: 32px; margin-bottom: 8px; }
  .creds-title { font-size: 15px; font-weight: 700; color: var(--pastef-green-dark); margin-bottom: 16px; }

  .creds-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 8px;
  }

  .creds-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .creds-value { font-size: 13px; font-weight: 700; font-family: var(--font-mono); color: var(--ink); user-select: all; }

  .creds-copy {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--pastef-green); transition: all 0.15s;
  }
  .creds-copy:hover { background: var(--pastef-green-soft); }

  .creds-warning {
    font-size: 11px;
    color: var(--pastef-red);
    margin-top: 12px;
    font-weight: 500;
  }

  .empty-search {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .form-error {
    background: var(--pastef-red-soft);
    color: var(--pastef-red-dark);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  @media (max-width: 768px) {
    .radio-cards { grid-template-columns: 1fr; }
    .modal { max-width: 100%; margin: 10px; }
    .search-box { min-width: 160px; }
    .page-header { flex-direction: column; align-items: stretch; }
  }

  @media (max-width: 480px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="page-loader"><div class="spinner"></div>Chargement des coordinateurs…</div>
    </div>
  </div>
</div>

<!-- Modal désignation -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Désigner un coordinateur</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script src="../../js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../shared/supabase-client.js"></script>
<script src="../../shared/utils.js"></script>
<script src="../../shared/auth.js"></script>
<script src="../../shared/sidebar.js"></script>
<script src="../../shared/topbar.js"></script>

<script>
(async function () {
  'use strict';

  const session = await PASTEF.auth.requireAuth(['admin']);
  if (!session) return;

  PASTEF.sidebar.render(session, 'coordinateurs');
  PASTEF.topbar.render({ session, title: 'Coordinateurs', breadcrumb: 'Gestion des coordinateurs' });

  // 🆕 Mapping rôle → type de cellule (colonne `cellules.type`)
  const ROLE_TO_CELLULE_TYPE = {
    departemental: 'departementale',
    communal: 'communale',
    diaspora: 'diaspora',
  };

  let allCoordinators = [];

  /* ============================================
     🆕 CHARGEMENT DEPUIS SUPABASE
     ============================================ */
  async function loadCoordinators() {
    const { data, error } = await PASTEF.supabase
      .from('coordinator_accounts')
      .select(`
        *,
        enrolment:enrolment_id ( prenom, nom, telephone ),
        cellule:cellule_id ( nom, type, pays, region, departement, commune, ville_diaspora )
      `)
      .order('created_at', { ascending: false });

    if (error) throw error;
    return data || [];
  }

  const content = document.getElementById('content');

  try {
    allCoordinators = await loadCoordinators();
  } catch (err) {
    console.error(err);
    content.innerHTML = `
      <div class="empty">
        <div class="empty-title">Erreur de chargement</div>
        <div class="empty-text">${PASTEF.utils.escapeHtml(err.message)}</div>
      </div>
    `;
    return;
  }

  /* ============================================
     HELPERS D'AFFICHAGE
     ============================================ */
  function computeStats(list) {
    return {
      total: list.length,
      dept: list.filter((c) => c.role === 'departemental').length,
      comm: list.filter((c) => c.role === 'communal').length,
      diaspora: list.filter((c) => c.role === 'diaspora').length,
      actifs: list.filter((c) => c.active).length,
      inactifs: list.filter((c) => !c.active).length,
    };
  }

  function roleLabel(role) {
    return { admin: 'Admin', departemental: 'Départemental', communal: 'Communal', diaspora: 'Diaspora' }[role] || role;
  }

  function roleBadge(role) {
    const cls = { departemental: 'badge-green', communal: 'badge-or', diaspora: 'badge-neutral', admin: 'badge-green' }[role] || 'badge-neutral';
    return `<span class="badge ${cls}">${roleLabel(role)}</span>`;
  }

  function avatarCls(role) {
    return { departemental: 'avatar-green', communal: 'avatar-or', diaspora: 'avatar-ink' }[role] || 'avatar-ink';
  }

  function initialsOf(c) {
    const p = c.enrolment?.prenom || c.email || '?';
    const n = c.enrolment?.nom || '';
    return `${(p[0] || '?').toUpperCase()}${(n[0] || '').toUpperCase()}`;
  }

  function displayName(c) {
    if (c.enrolment?.prenom || c.enrolment?.nom) return `${c.enrolment.prenom || ''} ${c.enrolment.nom || ''}`.trim();
    return c.email;
  }

  function displayLieu(c) {
    const cel = c.cellule;
    if (!cel) return { main: '—', sub: '' };
    if (cel.type === 'diaspora') return { main: cel.nom, sub: cel.ville_diaspora || cel.pays || '' };
    return { main: cel.nom, sub: [cel.commune, cel.departement, cel.region].filter(Boolean).join(' · ') };
  }

  function timeAgo(dateStr) {
    if (!dateStr) return 'Jamais';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return "Aujourd'hui";
    if (diff === 1) return 'Hier';
    if (diff < 7) return `Il y a ${diff} jours`;
    if (diff < 30) return `Il y a ${Math.floor(diff / 7)} sem.`;
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  }

  function renderTable(data) {
    if (!data.length) {
      return '<tr><td colspan="6" class="empty-search">Aucun coordinateur trouvé</td></tr>';
    }
    return data.map((c) => {
      const lieu = displayLieu(c);
      return `
      <tr data-id="${c.id}">
        <td>
          <div class="coord-cell">
            <div class="coord-avatar ${avatarCls(c.role)}">${initialsOf(c)}</div>
            <div>
              <div class="coord-name">${PASTEF.utils.escapeHtml(displayName(c))}</div>
              <div class="coord-phone">${PASTEF.utils.escapeHtml(c.enrolment?.telephone || c.email || '')}</div>
            </div>
          </div>
        </td>
        <td>${roleBadge(c.role)}</td>
        <td>
          <div style="font-weight:500;">${PASTEF.utils.escapeHtml(lieu.main)}</div>
          <div class="coord-lieu">${PASTEF.utils.escapeHtml(lieu.sub)}</div>
        </td>
        <td><span class="badge ${c.active ? 'badge-green' : 'badge-red'}"><span class="badge-dot"></span>${c.active ? 'Actif' : 'Inactif'}</span></td>
        <td><span class="last-login">${timeAgo(c.last_login)}</span></td>
        <td>
          <div class="coord-actions">
            <button title="Modifier" onclick="editCoord('${c.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button title="${c.active ? 'Désactiver' : 'Réactiver'}" class="${c.active ? 'danger' : ''}" onclick="toggleCoord('${c.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${c.active
                ? '<path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/><line x1="12" y1="2" x2="12" y2="12"/>'
                : '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>'
              }</svg>
            </button>
          </div>
        </td>
      </tr>
    `;
    }).join('');
  }

  function renderPage() {
    const stats = computeStats(allCoordinators);
    content.innerHTML = `
      <div class="kpi-strip">
        <div class="kpi kpi-green">
          <div class="kpi-label">Total coordinateurs</div>
          <div class="kpi-value">${stats.total}</div>
          <div class="kpi-sub">${stats.actifs} actifs · ${stats.inactifs} inactif${stats.inactifs > 1 ? 's' : ''}</div>
        </div>
        <div class="kpi kpi-green">
          <div class="kpi-label">Départementaux</div>
          <div class="kpi-value">${stats.dept}</div>
        </div>
        <div class="kpi kpi-or">
          <div class="kpi-label">Communaux</div>
          <div class="kpi-value">${stats.comm}</div>
        </div>
        <div class="kpi kpi-ink">
          <div class="kpi-label">Diaspora</div>
          <div class="kpi-value">${stats.diaspora}</div>
        </div>
      </div>

      <div class="page-header">
        <div class="page-header-left">
          <div class="search-box">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchCoord" placeholder="Chercher un coordinateur…" oninput="filterCoords(this.value)" />
          </div>
          <select class="field-select" style="height:38px;width:auto;" onchange="filterRole(this.value)">
            <option value="">Tous les rôles</option>
            <option value="departemental">Départemental</option>
            <option value="communal">Communal</option>
            <option value="diaspora">Diaspora</option>
          </select>
        </div>
        <button class="btn-designate" onclick="openDesignation()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Désigner un coordinateur
        </button>
      </div>

      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <div style="overflow-x:auto;">
          <table class="coord-table">
            <thead>
              <tr>
                <th>Coordinateur</th>
                <th>Rôle</th>
                <th>Affectation</th>
                <th>Statut</th>
                <th>Dernière connexion</th>
                <th style="width:80px;"></th>
              </tr>
            </thead>
            <tbody id="coordBody">${renderTable(allCoordinators)}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  renderPage();

  /* ============================================
     FILTRAGE TABLE
     ============================================ */
  let currentFilter = '';
  let currentRole = '';

  window.filterCoords = function (q) {
    currentFilter = q.toLowerCase();
    applyFilters();
  };

  window.filterRole = function (role) {
    currentRole = role;
    applyFilters();
  };

  function applyFilters() {
    let data = allCoordinators;
    if (currentRole) data = data.filter((c) => c.role === currentRole);
    if (currentFilter) {
      data = data.filter((c) => {
        const name = displayName(c).toLowerCase();
        const phone = (c.enrolment?.telephone || '').toLowerCase();
        const lieu = displayLieu(c).main.toLowerCase();
        return name.includes(currentFilter) || phone.includes(currentFilter) || lieu.includes(currentFilter);
      });
    }
    document.getElementById('coordBody').innerHTML = renderTable(data);
  }

  /* ============================================
     🆕 TOGGLE ACTIF/INACTIF — vraie mise à jour Supabase
     ============================================ */
  window.toggleCoord = async function (id) {
    const c = allCoordinators.find((x) => x.id === id);
    if (!c) return;

    const action = c.active ? 'désactiver' : 'réactiver';
    if (!confirm(`Voulez-vous ${action} ${displayName(c)} ?`)) return;

    const newActive = !c.active;
    const row = document.querySelector(`tr[data-id="${id}"]`);
    row?.querySelectorAll('button').forEach((b) => (b.disabled = true));

    try {
      const { error } = await PASTEF.supabase
        .from('coordinator_accounts')
        .update({ active: newActive })
        .eq('id', id);

      if (error) throw error;

      c.active = newActive;
      applyFilters();
      renderKpisOnly();
      PASTEF.utils.toast(newActive ? 'Coordinateur réactivé' : 'Coordinateur désactivé', displayName(c));
    } catch (err) {
      console.error(err);
      PASTEF.utils.toast('Erreur', err.message, { color: 'var(--pastef-red)' });
      row?.querySelectorAll('button').forEach((b) => (b.disabled = false));
    }
  };

  function renderKpisOnly() {
    const stats = computeStats(allCoordinators);
    const kpiValues = document.querySelectorAll('.kpi-value');
    if (kpiValues.length >= 4) {
      kpiValues[0].textContent = stats.total;
      document.querySelector('.kpi-sub').textContent = `${stats.actifs} actifs · ${stats.inactifs} inactif${stats.inactifs > 1 ? 's' : ''}`;
      kpiValues[1].textContent = stats.dept;
      kpiValues[2].textContent = stats.comm;
      kpiValues[3].textContent = stats.diaspora;
    }
  }

  /* ============================================
     ÉDITION — fonctionnalité à venir
     Modifier le rôle/la cellule d'un coordinateur existant est une
     opération distincte de la désignation (pas de création de compte
     Auth). Volontairement pas encore branchée pour rester focalisé
     sur "les vraies personnes dans la base" — dites-moi si vous
     voulez qu'on l'implémente ensuite.
     ============================================ */
  window.editCoord = function (id) {
    PASTEF.utils.toast('Bientôt disponible', "L'édition d'un coordinateur existant arrive dans une prochaine itération", { color: 'var(--pastef-or)' });
  };

  /* ============================================
     MODAL — FLOW DE DÉSIGNATION (branché sur Supabase)
     ============================================ */
  const overlay = document.getElementById('modalOverlay');
  const mBody = document.getElementById('modalBody');
  const mFooter = document.getElementById('modalFooter');
  const mTitle = document.getElementById('modalTitle');

  let designState = { step: 1, role: '', region: '', departement: '', pays: '', celluleId: '', celluleNom: '', inscrit: null, email: '', error: '' };
  let celluleOptionsCache = [];

  window.openDesignation = function () {
    designState = { step: 1, role: '', region: '', departement: '', pays: '', celluleId: '', celluleNom: '', inscrit: null, email: '', error: '' };
    renderStep();
    overlay.classList.add('open');
  };

  window.closeModal = function () {
    overlay.classList.remove('open');
  };

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  function renderStep() {
    const s = designState;

    const stepsHtml = `
      <div class="steps">
        <div class="step ${s.step >= 1 ? 'done' : ''} ${s.step === 1 ? 'active' : ''}"></div>
        <div class="step ${s.step >= 2 ? 'done' : ''} ${s.step === 2 ? 'active' : ''}"></div>
        <div class="step ${s.step >= 3 ? 'done' : ''} ${s.step === 3 ? 'active' : ''}"></div>
        <div class="step ${s.step >= 4 ? 'done' : ''} ${s.step === 4 ? 'active' : ''}"></div>
        <div class="step ${s.step >= 5 ? 'done' : ''} ${s.step === 5 ? 'active' : ''}"></div>
      </div>
    `;

    if (s.step === 1) {
      mTitle.textContent = 'Étape 1 — Choisir le niveau';
      mBody.innerHTML = stepsHtml + `
        <div class="field"><label class="field-label">Type de coordinateur à désigner</label></div>
        <div class="radio-cards">
          <label class="radio-card ${s.role === 'departemental' ? 'selected' : ''}" onclick="selectRole('departemental')">
            <input type="radio" name="role" value="departemental" />
            <div class="radio-card-icon">🏛️</div>
            <div class="radio-card-label">Départemental</div>
            <div class="radio-card-desc">Gère un département</div>
          </label>
          <label class="radio-card ${s.role === 'communal' ? 'selected' : ''}" onclick="selectRole('communal')">
            <input type="radio" name="role" value="communal" />
            <div class="radio-card-icon">🏘️</div>
            <div class="radio-card-label">Communal</div>
            <div class="radio-card-desc">Gère une commune</div>
          </label>
          <label class="radio-card ${s.role === 'diaspora' ? 'selected' : ''}" onclick="selectRole('diaspora')">
            <input type="radio" name="role" value="diaspora" />
            <div class="radio-card-icon">🌍</div>
            <div class="radio-card-label">Diaspora</div>
            <div class="radio-card-desc">Cellule d'un pays</div>
          </label>
        </div>
      `;
      mFooter.innerHTML = `
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary btn-sm" onclick="nextStep()" ${!s.role ? 'disabled' : ''}>Suivant</button>
      `;
    }

    else if (s.step === 2) {
      mTitle.textContent = 'Étape 2 — Choisir la cellule à rattacher';
      renderLieuStep();
    }

    else if (s.step === 3) {
      mTitle.textContent = 'Étape 3 — Chercher un inscrit';
      mBody.innerHTML = stepsHtml + `
        <div class="field">
          <label class="field-label">Rechercher par nom ou téléphone</label>
          <input class="field-input" type="text" id="searchInscrit" placeholder="Ex: Modou Kane ou 77 111…" oninput="onSearchInscrit(this.value)" autofocus />
          <div class="field-hint">L'inscrit doit déjà être enregistré sur la plateforme</div>
        </div>
        <div id="searchResultsContainer"></div>
        ${s.inscrit ? `
          <div style="margin-top:12px;padding:12px;background:var(--pastef-green-soft);border-radius:var(--radius-sm);border:1px solid var(--pastef-green);">
            <div style="font-size:13px;font-weight:600;color:var(--pastef-green-dark);">Sélectionné : ${PASTEF.utils.escapeHtml(s.inscrit.prenom)} ${PASTEF.utils.escapeHtml(s.inscrit.nom)}</div>
            <div style="font-size:11px;color:var(--pastef-green);margin-top:2px;">${PASTEF.utils.escapeHtml(s.inscrit.telephone || '')}</div>
          </div>
        ` : ''}
      `;
      mFooter.innerHTML = `
        <button class="btn btn-secondary btn-sm" onclick="prevStep()">Retour</button>
        <button class="btn btn-primary btn-sm" onclick="nextStep()" ${!s.inscrit ? 'disabled' : ''}>Suivant</button>
      `;
    }

    else if (s.step === 4) {
      mTitle.textContent = 'Étape 4 — Email et confirmation';
      mBody.innerHTML = stepsHtml + `
        ${s.error ? `<div class="form-error">${PASTEF.utils.escapeHtml(s.error)}</div>` : ''}
        <div style="padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);margin-bottom:16px;font-size:12px;">
          <div style="font-weight:700;color:var(--ink);margin-bottom:8px;">Récapitulatif</div>
          <div style="display:grid;grid-template-columns:100px 1fr;gap:4px 12px;color:var(--text-muted);">
            <span>Niveau</span><span style="font-weight:600;color:var(--text);">${roleLabel(s.role)}</span>
            <span>Cellule</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(s.celluleNom || '—')}</span>
            <span>Inscrit</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(s.inscrit.prenom)} ${PASTEF.utils.escapeHtml(s.inscrit.nom)}</span>
            <span>Téléphone</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(s.inscrit.telephone || '—')}</span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Email du coordinateur</label>
          <input class="field-input" type="email" id="emailCoord" placeholder="prenom.nom@email.com" value="${PASTEF.utils.escapeHtml(s.email)}" oninput="designState.email = this.value" />
          <div class="field-hint">Un compte de connexion sera créé avec un mot de passe temporaire</div>
        </div>
      `;
      mFooter.innerHTML = `
        <button class="btn btn-secondary btn-sm" onclick="prevStep()">Retour</button>
        <button class="btn btn-primary btn-sm" id="btnConfirm" onclick="executeDesignation()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmer la désignation
        </button>
      `;
    }

    else if (s.step === 5) {
      mTitle.textContent = 'Coordinateur désigné';
      mBody.innerHTML = `
        <div class="creds-card">
          <div class="creds-icon">✅</div>
          <div class="creds-title">${PASTEF.utils.escapeHtml(s.result.prenom)} ${PASTEF.utils.escapeHtml(s.result.nom)} est maintenant ${roleLabel(s.role)}</div>
          <div class="creds-row">
            <div><div class="creds-label">Email</div><div class="creds-value">${PASTEF.utils.escapeHtml(s.result.email)}</div></div>
            <button class="creds-copy" onclick="copyText('${s.result.email}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="creds-row">
            <div><div class="creds-label">Mot de passe temporaire</div><div class="creds-value">${s.result.password}</div></div>
            <button class="creds-copy" onclick="copyText('${s.result.password}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <div class="creds-row">
            <div><div class="creds-label">Affectation</div><div class="creds-value" style="font-family:inherit;">${PASTEF.utils.escapeHtml(s.celluleNom || '—')}</div></div>
          </div>
          <div class="creds-warning">Transmettez ces identifiants au coordinateur. Conservez-les précieusement : le mot de passe ne sera plus jamais affiché.</div>
        </div>
      `;
      mFooter.innerHTML = `<button class="btn btn-primary btn-sm" onclick="closeModal()">Fermer</button>`;
    }
  }

  window.selectRole = function (role) {
    designState.role = role;
    designState.region = '';
    designState.departement = '';
    designState.pays = '';
    designState.celluleId = '';
    designState.celluleNom = '';
    renderStep();
  };

  window.nextStep = function () {
    const s = designState;
    if (s.step === 2 && !s.celluleId) {
      alert("Choisissez une cellule (ou continuez sans cellule si aucune n'existe encore pour cette zone)");
      return;
    }
    s.step++;
    renderStep();
  };

  window.prevStep = function () {
    designState.step--;
    renderStep();
  };

  /* ============================================
     🆕 ÉTAPE 2 — sélection d'une cellule RÉELLE
     (table `cellules`, filtrée par type selon le rôle)
     ============================================ */
  async function renderLieuStep() {
    const s = designState;
    const stepsHtml = document.querySelector('.steps') ? '' : ''; // no-op, steps re-rendered below
    const celluleType = ROLE_TO_CELLULE_TYPE[s.role];

    let scopeFieldHtml = '';
    if (s.role === 'departemental' || s.role === 'communal') {
      // Régions officielles depuis la table `communes`
      let regions = [];
      try {
        const { data, error } = await PASTEF.supabase.from('communes').select('region').eq('active', true);
        if (!error) regions = [...new Set((data || []).map((r) => r.region))].sort();
      } catch (e) { console.warn(e); }

      scopeFieldHtml = `
        <div class="field">
          <label class="field-label">Région</label>
          <select class="field-select" id="selRegion" onchange="onScopeRegionChange(this.value)">
            <option value="">Sélectionner une région</option>
            ${regions.map((r) => `<option value="${PASTEF.utils.escapeHtml(r)}" ${s.region === r ? 'selected' : ''}>${PASTEF.utils.escapeHtml(r)}</option>`).join('')}
          </select>
        </div>
      `;
    } else {
      const pays = PASTEF_DATA_PAYS_FALLBACK();
      scopeFieldHtml = `
        <div class="field">
          <label class="field-label">Pays</label>
          <select class="field-select" id="selPays" onchange="onScopePaysChange(this.value)">
            <option value="">Sélectionner un pays</option>
            ${pays.map((p) => `<option value="${PASTEF.utils.escapeHtml(p)}" ${s.pays === p ? 'selected' : ''}>${PASTEF.utils.escapeHtml(p)}</option>`).join('')}
          </select>
        </div>
      `;
    }

    mBody.innerHTML = `
      <div class="steps">
        <div class="step done"></div><div class="step active"></div><div class="step"></div><div class="step"></div><div class="step"></div>
      </div>
      ${scopeFieldHtml}
      <div class="field">
        <label class="field-label">Cellule (type "${celluleType}")</label>
        <select class="field-select" id="selCellule" onchange="onCelluleChange(this.value)" disabled>
          <option value="">${s.role === 'communal' ? "Sélectionnez d'abord une région" : "Sélectionnez d'abord un pays/une région"}</option>
        </select>
        <div class="field-hint" id="celluleHint"></div>
      </div>
    `;

    mFooter.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="prevStep()">Retour</button>
      <button class="btn btn-primary btn-sm" onclick="nextStep()">Suivant</button>
    `;

    // Pré-remplissage si on revient en arrière puis en avant
    if (s.role === 'departemental' && s.region) setTimeout(() => onScopeRegionChange(s.region), 30);
    if (s.role === 'communal' && s.region) setTimeout(() => onScopeRegionChange(s.region), 30);
    if (s.role === 'diaspora' && s.pays) setTimeout(() => onScopePaysChange(s.pays), 30);
  }

  function PASTEF_DATA_PAYS_FALLBACK() {
    // Liste des pays diaspora (hors Sénégal) — reprend la même liste
    // que le formulaire public, sans dépendance à data.js ici
    return [
      'Algérie','Allemagne','Arabie Saoudite','Belgique','Bénin','Burkina Faso','Cameroun','Canada',
      'Cap-Vert','Chine',"Côte d'Ivoire",'Émirats Arabes Unis','Espagne','États-Unis','France','Gabon',
      'Gambie','Ghana','Guinée','Guinée-Bissau','Italie','Mali','Maroc','Mauritanie','Niger','Nigéria',
      'Pays-Bas','Portugal','Royaume-Uni','Suisse','Tunisie','Turquie',
    ];
  }

  window.onScopeRegionChange = async function (region) {
    designState.region = region;
    designState.celluleId = '';
    designState.celluleNom = '';
    await loadCellulesForScope();
  };

  window.onScopePaysChange = async function (pays) {
    designState.pays = pays;
    designState.celluleId = '';
    designState.celluleNom = '';
    await loadCellulesForScope();
  };

  async function loadCellulesForScope() {
    const s = designState;
    const sel = document.getElementById('selCellule');
    const hint = document.getElementById('celluleHint');
    if (!sel) return;

    const celluleType = ROLE_TO_CELLULE_TYPE[s.role];
    sel.disabled = true;
    sel.innerHTML = '<option value="">Chargement…</option>';

    try {
      let q = PASTEF.supabase.from('cellules').select('id,nom,region,departement,commune,pays,ville_diaspora')
        .eq('type', celluleType)
        .eq('active', true);

      if (s.role === 'departemental' || s.role === 'communal') {
        q = q.eq('pays', 'Sénégal').eq('region', s.region);
      } else {
        q = q.ilike('pays', s.pays);
      }

      const { data, error } = await q.order('nom', { ascending: true });
      if (error) throw error;

      celluleOptionsCache = data || [];

      if (!celluleOptionsCache.length) {
        sel.innerHTML = '<option value="">Aucune cellule de ce type dans cette zone</option>';
        sel.disabled = true;
        hint.textContent = `Aucune cellule "${celluleType}" trouvée ici. Créez-la d'abord dans la gestion des cellules, ou continuez sans cellule (l'affectation pourra être faite plus tard).`;
        return;
      }

      sel.innerHTML = '<option value="">Sélectionner une cellule</option>' +
        celluleOptionsCache.map((c) => `<option value="${c.id}">${PASTEF.utils.escapeHtml(c.nom)}</option>`).join('');
      sel.disabled = false;
      hint.textContent = `${celluleOptionsCache.length} cellule(s) disponible(s)`;
    } catch (err) {
      console.error(err);
      sel.innerHTML = '<option value="">Erreur de chargement</option>';
      hint.textContent = err.message;
    }
  }

  window.onCelluleChange = function (celluleId) {
    designState.celluleId = celluleId;
    const found = celluleOptionsCache.find((c) => c.id === celluleId);
    designState.celluleNom = found ? found.nom : '';
  };

  /* ============================================
     🆕 ÉTAPE 3 — recherche RÉELLE d'inscrits (table enrolments)
     ============================================ */
  let searchDebounce = null;

  window.onSearchInscrit = function (q) {
    clearTimeout(searchDebounce);
    const container = document.getElementById('searchResultsContainer');
    if (!q || q.trim().length < 2) {
      container.innerHTML = '';
      return;
    }
    container.innerHTML = '<div class="empty-search">Recherche…</div>';
    searchDebounce = setTimeout(() => runSearchInscrit(q.trim()), 300);
  };

  async function runSearchInscrit(q) {
    const container = document.getElementById('searchResultsContainer');
    if (!container) return; // l'utilisateur a changé d'étape entre-temps

    try {
      const { data, error } = await PASTEF.supabase
        .from('enrolments')
        .select('id,prenom,nom,telephone,pays,region,commune,quartier')
        .or(`prenom.ilike.%${q}%,nom.ilike.%${q}%,telephone.ilike.%${q}%`)
        .limit(15);

      if (error) throw error;

      if (!data || !data.length) {
        container.innerHTML = '<div class="empty-search">Aucun inscrit trouvé</div>';
        return;
      }

      container.innerHTML = `
        <div class="search-results">
          ${data.map((r) => `
            <div class="search-result-item ${designState.inscrit?.id === r.id ? 'selected' : ''}" onclick="selectInscrit('${r.id}')">
              <div class="coord-avatar avatar-green" style="width:30px;height:30px;font-size:11px;">${(r.prenom?.[0] || '?').toUpperCase()}${(r.nom?.[0] || '').toUpperCase()}</div>
              <div>
                <div class="search-result-name">${PASTEF.utils.escapeHtml(r.prenom || '')} ${PASTEF.utils.escapeHtml(r.nom || '')}</div>
                <div class="search-result-info">${PASTEF.utils.escapeHtml(r.telephone || '')} · ${PASTEF.utils.escapeHtml(r.commune || r.quartier || r.region || r.pays || '')}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      window.__searchInscritResults = data;
    } catch (err) {
      console.error(err);
      container.innerHTML = `<div class="empty-search">Erreur : ${PASTEF.utils.escapeHtml(err.message)}</div>`;
    }
  }

  window.selectInscrit = function (id) {
    const found = (window.__searchInscritResults || []).find((i) => i.id === id);
    if (!found) return;
    designState.inscrit = found;
    designState.email = designState.email || '';
    renderStep();
  };

  /* ============================================
     🆕 ÉTAPE 5 — exécution via l'Edge Function
     (aucune création de compte Auth n'est possible directement
     depuis ce fichier — clé anonyme insuffisante, voir
     supabase/functions/create-coordinator/index.ts)
     ============================================ */
  window.executeDesignation = async function () {
    const s = designState;
    s.error = '';

    if (!s.email || !s.email.includes('@')) {
      s.error = 'Entrez un email valide';
      renderStep();
      return;
    }

    const btn = document.getElementById('btnConfirm');
    if (btn) { btn.disabled = true; btn.textContent = 'Création en cours…'; }

    try {
      const { data: { session: authSession } } = await PASTEF.supabase.auth.getSession();
      const accessToken = authSession?.access_token;
      if (!accessToken) throw new Error('Session expirée, reconnectez-vous');

      const { data, error } = await PASTEF.supabase.functions.invoke('create-coordinator', {
        body: {
          email: s.email.trim(),
          role: s.role,
          cellule_id: s.celluleId || null,
          enrolment_id: s.inscrit.id,
        },
      });

      if (error) throw error;
      if (data?.error) throw new Error(data.error);

      s.result = data;
      s.step = 5;
      renderStep();

      // Recharge la vraie liste depuis Supabase (pas un push local)
      allCoordinators = await loadCoordinators();
      applyFilters();
      renderKpisOnly();
    } catch (err) {
      console.error(err);
      s.error = err.message || 'Erreur lors de la création du coordinateur';
      renderStep();
    } finally {
      const btnAgain = document.getElementById('btnConfirm');
      if (btnAgain) { btnAgain.disabled = false; btnAgain.innerHTML = 'Confirmer la désignation'; }
    }
  };

  window.copyText = function (text) {
    navigator.clipboard.writeText(text).then(() => {
      PASTEF.utils.toast('Copié', '', { color: 'var(--pastef-green)' });
    });
  };

})();
</script>

</body>
</html>
