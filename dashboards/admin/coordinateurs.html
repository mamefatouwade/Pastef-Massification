<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coordinateurs — PASTEF Admin</title>
<link rel="icon" type="image/jpeg" href="../../assets/logo.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="../../styles/components.css" />
<link rel="stylesheet" href="../../styles/sidebar.css" />

<style>
  /* ============================================
     Coordinateurs — Styles spécifiques
     ============================================ */

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; }
  .kpi-green::before { background: var(--pastef-green); }
  .kpi-or::before    { background: var(--pastef-or); }
  .kpi-red::before   { background: var(--pastef-red); }
  .kpi-ink::before   { background: var(--ink); }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -0.5px; }
  .kpi-sub   { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Header actions */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    height: 38px;
    min-width: 240px;
  }

  .search-box svg { flex-shrink: 0; color: var(--text-muted); }

  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    width: 100%;
  }

  .search-box:focus-within {
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .btn-designate {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 38px;
    padding: 0 18px;
    background: var(--pastef-green);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-designate:hover { background: var(--pastef-green-dark); transform: translateY(-1px); box-shadow: var(--shadow-sm); }

  /* Table coordinateurs */
  .coord-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .coord-table thead tr { border-bottom: 1px solid var(--border); background: var(--bg-soft); }
  .coord-table th { padding: 11px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .coord-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  .coord-table tr:last-child td { border-bottom: none; }
  .coord-table tr:hover td { background: var(--bg-soft); }

  .coord-name { font-weight: 600; color: var(--ink); }
  .coord-phone { font-size: 12px; color: var(--text-muted); margin-top: 1px; font-family: var(--font-mono); }
  .coord-lieu  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .coord-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }

  .avatar-green { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .avatar-or    { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .avatar-ink   { background: var(--bg); color: var(--text-muted); }

  .coord-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-green  { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .badge-or     { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .badge-red    { background: var(--pastef-red-soft); color: var(--pastef-red); }
  .badge-neutral { background: var(--bg); color: var(--text-muted); }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .coord-actions { display: flex; gap: 4px; }
  .coord-actions button {
    width: 30px; height: 30px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .coord-actions button:hover { background: var(--bg); color: var(--pastef-green); }
  .coord-actions button.danger:hover { color: var(--pastef-red); }

  .last-login { font-size: 11px; color: var(--text-muted); }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(15,26,20,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-light);
  }

  .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s;
  }
  .modal-close:hover { background: var(--bg); color: var(--ink); }

  .modal-body { padding: 20px 24px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border-light);
  }

  /* Steps indicator */
  .steps { display: flex; gap: 4px; margin-bottom: 24px; }

  .step {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border-light);
    transition: background 0.3s;
  }

  .step.done { background: var(--pastef-green); }
  .step.active { background: var(--pastef-green-light); }

  /* Form fields */
  .field { margin-bottom: 18px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
  .field-hint  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .field-input, .field-select {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    background: var(--card);
    transition: border-color 0.15s;
  }

  .field-input:focus, .field-select:focus {
    outline: none;
    border-color: var(--pastef-green);
    box-shadow: 0 0 0 3px rgba(27,124,61,0.08);
  }

  .field-select { appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B7B72' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 12px center;
    padding-right: 30px;
  }

  /* Radio cards */
  .radio-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .radio-card {
    position: relative;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .radio-card:hover { border-color: var(--pastef-green); }

  .radio-card.selected {
    border-color: var(--pastef-green);
    background: var(--pastef-green-soft);
  }

  .radio-card input { position: absolute; opacity: 0; pointer-events: none; }

  .radio-card-icon { font-size: 20px; margin-bottom: 4px; }
  .radio-card-label { font-size: 12px; font-weight: 600; color: var(--ink); }
  .radio-card-desc  { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* Search results */
  .search-results {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    max-height: 200px;
    overflow-y: auto;
    margin-top: 6px;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border-light);
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--pastef-green-soft); }
  .search-result-item.selected { background: var(--pastef-green-soft); border-left: 3px solid var(--pastef-green); }

  .search-result-name  { font-size: 13px; font-weight: 600; color: var(--ink); }
  .search-result-info  { font-size: 11px; color: var(--text-muted); }

  /* Credentials card */
  .creds-card {
    background: var(--pastef-green-soft);
    border: 1.5px solid var(--pastef-green);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }

  .creds-icon { font-size: 32px; margin-bottom: 8px; }
  .creds-title { font-size: 15px; font-weight: 700; color: var(--pastef-green-dark); margin-bottom: 16px; }

  .creds-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 8px;
  }

  .creds-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .creds-value { font-size: 13px; font-weight: 700; font-family: var(--font-mono); color: var(--ink); user-select: all; }

  .creds-copy {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--pastef-green); transition: all 0.15s;
  }
  .creds-copy:hover { background: var(--pastef-green-soft); }

  .creds-warning {
    font-size: 11px;
    color: var(--pastef-red);
    margin-top: 12px;
    font-weight: 500;
  }

  /* Empty state */
  .empty-search {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .radio-cards { grid-template-columns: 1fr; }
    .modal { max-width: 100%; margin: 10px; }
    .search-box { min-width: 160px; }
    .page-header { flex-direction: column; align-items: stretch; }
  }

  @media (max-width: 480px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<body>
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content">
      <div class="page-loader"><div class="spinner"></div>Chargement des coordinateurs…</div>
    </div>
  </div>
</div>

<!-- Modal désignation -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Désigner un coordinateur</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script src="../../js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../js/data.js"></script>
<script src="../../shared/supabase-client.js"></script>
<script src="../../shared/utils.js"></script>
<script src="../../shared/auth.js"></script>
<script src="../../shared/sidebar.js"></script>
<script src="../../shared/topbar.js"></script>

<script>
(async function () {
  'use strict';

  const session = await PASTEF.auth.requireAuth(['admin']);
  if (!session) return;

  PASTEF.sidebar.render(session, 'coordinateurs');
  PASTEF.topbar.render({ session, title: 'Coordinateurs', breadcrumb: 'Gestion des coordinateurs' });

  const content = document.getElementById('content');
  let allCoordinators = [];

  /* ============================================
     CHARGEMENT DEPUIS SUPABASE
  ============================================ */
  async function loadCoordinators() {
    const { data, error } = await PASTEF.supabase
      .from('coordinator_accounts')
      .select(`
        *,
        enrolment:enrolment_id ( prenom, nom, telephone )
      `)
      .order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  }

  try {
    allCoordinators = await loadCoordinators();
  } catch (err) {
    console.error(err);
    content.innerHTML = `<div class="empty"><div class="empty-title">Erreur</div><div class="empty-text">${PASTEF.utils.escapeHtml(err.message)}</div></div>`;
    return;
  }

  /* ============================================
     HELPERS
  ============================================ */
  function roleLabel(role) {
    return { departemental: 'Départemental', communal: 'Communal', diaspora: 'Diaspora', admin: 'Admin' }[role] || role;
  }

  function roleBadge(role) {
    const cls = { departemental: 'badge-green', communal: 'badge-or', diaspora: 'badge-neutral', admin: 'badge-green' }[role] || 'badge-neutral';
    return `<span class="badge ${cls}">${roleLabel(role)}</span>`;
  }

  function avatarCls(role) {
    return { departemental: 'avatar-green', communal: 'avatar-or', diaspora: 'avatar-ink' }[role] || 'avatar-ink';
  }

  function displayName(c) {
    if (c.enrolment?.prenom || c.enrolment?.nom) return `${c.enrolment.prenom || ''} ${c.enrolment.nom || ''}`.trim();
    return c.email || '—';
  }

  function displayLieu(c) {
    const parts = [c.commune, c.departement, c.region, c.pays].filter(Boolean);
    return parts.join(' · ') || '—';
  }

  function timeAgo(dateStr) {
    if (!dateStr) return 'Jamais';
    const d = new Date(dateStr);
    const diff = Math.floor((new Date() - d) / 86400000);
    if (diff === 0) return "Aujourd'hui";
    if (diff === 1) return 'Hier';
    if (diff < 7) return `Il y a ${diff} jours`;
    if (diff < 30) return `Il y a ${Math.floor(diff / 7)} sem.`;
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  }

  function computeStats(list) {
    return {
      total: list.length,
      dept: list.filter(c => c.role === 'departemental').length,
      comm: list.filter(c => c.role === 'communal').length,
      diaspora: list.filter(c => c.role === 'diaspora').length,
      actifs: list.filter(c => c.active).length,
      inactifs: list.filter(c => !c.active).length,
    };
  }

  /* ============================================
     RENDU TABLE
  ============================================ */
  function renderTable(data) {
    if (!data.length) {
      return '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">Aucun coordinateur trouvé</td></tr>';
    }
    return data.map(c => `
      <tr data-id="${c.id}">
        <td>
          <div class="coord-cell">
            <div class="coord-avatar ${avatarCls(c.role)}">${(displayName(c)[0] || '?').toUpperCase()}${(displayName(c).split(' ')[1]?.[0] || '').toUpperCase()}</div>
            <div>
              <div class="coord-name">${PASTEF.utils.escapeHtml(displayName(c))}</div>
              <div class="coord-phone">${PASTEF.utils.escapeHtml(c.enrolment?.telephone || c.email || '')}</div>
            </div>
          </div>
        </td>
        <td>${roleBadge(c.role)}</td>
        <td style="font-size:13px;">${PASTEF.utils.escapeHtml(displayLieu(c))}</td>
        <td><span class="badge ${c.active ? 'badge-green' : 'badge-red'}"><span class="badge-dot"></span>${c.active ? 'Actif' : 'Inactif'}</span></td>
        <td><span class="last-login">${timeAgo(c.last_login)}</span></td>
        <td>
          <div class="coord-actions">
            <button title="${c.active ? 'Désactiver' : 'Réactiver'}" class="${c.active ? 'danger' : ''}" onclick="toggleCoord('${c.id}')">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${c.active
                ? '<path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/><line x1="12" y1="2" x2="12" y2="12"/>'
                : '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>'}
              </svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ============================================
     RENDU PAGE
  ============================================ */
  function renderPage() {
    const stats = computeStats(allCoordinators);
    content.innerHTML = `
      <div class="kpi-strip">
        <div class="kpi kpi-green">
          <div class="kpi-label">Total coordinateurs</div>
          <div class="kpi-value">${stats.total}</div>
          <div class="kpi-sub">${stats.actifs} actifs · ${stats.inactifs} inactif${stats.inactifs !== 1 ? 's' : ''}</div>
        </div>
        <div class="kpi kpi-green">
          <div class="kpi-label">Départementaux</div>
          <div class="kpi-value">${stats.dept}</div>
        </div>
        <div class="kpi kpi-or">
          <div class="kpi-label">Communaux</div>
          <div class="kpi-value">${stats.comm}</div>
        </div>
        <div class="kpi kpi-ink">
          <div class="kpi-label">Diaspora</div>
          <div class="kpi-value">${stats.diaspora}</div>
        </div>
      </div>

      <div class="page-header">
        <div class="page-header-left">
          <div class="search-box">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchCoord" placeholder="Chercher un coordinateur…" oninput="filterCoords(this.value)" />
          </div>
          <select class="field-select" style="height:38px;width:auto;" onchange="filterRole(this.value)">
            <option value="">Tous les rôles</option>
            <option value="departemental">Départemental</option>
            <option value="communal">Communal</option>
            <option value="diaspora">Diaspora</option>
          </select>
        </div>
        <button class="btn-designate" onclick="openDesignation()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Désigner un coordinateur
        </button>
      </div>

      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
        <div style="overflow-x:auto;">
          <table class="coord-table">
            <thead>
              <tr>
                <th>Coordinateur</th>
                <th>Rôle</th>
                <th>Zone</th>
                <th>Statut</th>
                <th>Dernière connexion</th>
                <th style="width:60px;"></th>
              </tr>
            </thead>
            <tbody id="coordBody">${renderTable(allCoordinators)}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  renderPage();

  /* ============================================
     FILTRES
  ============================================ */
  let currentFilter = '', currentRole = '';

  window.filterCoords = function (q) { currentFilter = q.toLowerCase(); applyFilters(); };
  window.filterRole = function (role) { currentRole = role; applyFilters(); };

  function applyFilters() {
    let data = allCoordinators;
    if (currentRole) data = data.filter(c => c.role === currentRole);
    if (currentFilter) {
      data = data.filter(c => {
        const name = displayName(c).toLowerCase();
        const phone = (c.enrolment?.telephone || '').toLowerCase();
        const lieu = displayLieu(c).toLowerCase();
        return name.includes(currentFilter) || phone.includes(currentFilter) || lieu.includes(currentFilter);
      });
    }
    document.getElementById('coordBody').innerHTML = renderTable(data);
  }

  /* ============================================
     TOGGLE ACTIF/INACTIF
  ============================================ */
  window.toggleCoord = async function (id) {
    const c = allCoordinators.find(x => x.id === id);
    if (!c) return;
    if (!confirm(`Voulez-vous ${c.active ? 'désactiver' : 'réactiver'} ${displayName(c)} ?`)) return;

    try {
      const { error } = await PASTEF.supabase
        .from('coordinator_accounts')
        .update({ active: !c.active })
        .eq('id', id);
      if (error) throw error;
      c.active = !c.active;
      applyFilters();
      PASTEF.utils.toast(c.active ? 'Coordinateur réactivé' : 'Coordinateur désactivé', displayName(c));
    } catch (err) {
      PASTEF.utils.toast('Erreur', err.message, { color: 'var(--pastef-red)' });
    }
  };

  /* ============================================
     MODAL DÉSIGNATION
     Étape 1 : Choisir le rôle
     Étape 2 : Choisir la zone (Région → Département → Commune pour Sénégal)
     Étape 3 : Choisir le patriote parmi ceux de cette zone
     Étape 4 : Email + confirmation
     Étape 5 : Résultat avec identifiants
  ============================================ */
  const overlay = document.getElementById('modalOverlay');
  const mBody  = document.getElementById('modalBody');
  const mFooter = document.getElementById('modalFooter');
  const mTitle  = document.getElementById('modalTitle');

  const CONTINENTS = {
    'Afrique': ['Algérie','Bénin','Burkina Faso','Cameroun','Cap-Vert',"Côte d'Ivoire",'Gabon','Gambie','Ghana','Guinée','Guinée-Bissau','Mali','Maroc','Mauritanie','Niger','Nigéria','Tunisie'],
    'Amérique': ['Canada','États-Unis'],
    'Asie': ['Chine'],
    'Europe': ['Allemagne','Belgique','Espagne','France','Italie','Pays-Bas','Portugal','Royaume-Uni','Suisse'],
    'Moyen-Orient': ['Arabie Saoudite','Émirats Arabes Unis','Turquie'],
  };

  let designState = {};
  let patriotesCache = [];

  function initState() {
    designState = { step: 1, role: '', region: '', departement: '', commune: '', continent: '', pays: '', inscrit: null, email: '', error: '', result: null };
  }

  function stepsHtml(current) {
    return `<div class="steps">${[1,2,3,4,5].map(i =>
      `<div class="step ${i < current ? 'done' : ''} ${i === current ? 'active' : ''}"></div>`
    ).join('')}</div>`;
  }

  function localisationLabel(s) {
    if (s.role === 'diaspora') return s.pays || '—';
    if (s.role === 'communal') return [s.commune, s.departement, s.region].filter(Boolean).join(', ');
    if (s.role === 'departemental') return [s.departement, s.region].filter(Boolean).join(', ');
    return '—';
  }

  /* ── ÉTAPE 1 : Rôle ── */
  function renderStep1() {
    const s = designState;
    mTitle.textContent = 'Étape 1 — Type de coordination';
    mBody.innerHTML = stepsHtml(1) + `
      <div class="field"><label class="field-label">Quel type de coordinateur désigner ?</label></div>
      <div class="radio-cards">
        <label class="radio-card ${s.role === 'departemental' ? 'selected' : ''}" onclick="selectRole('departemental')">
          <input type="radio" name="role" value="departemental" />
          <div class="radio-card-icon">🏛️</div>
          <div class="radio-card-label">Départemental</div>
          <div class="radio-card-desc">Gère un département</div>
        </label>
        <label class="radio-card ${s.role === 'communal' ? 'selected' : ''}" onclick="selectRole('communal')">
          <input type="radio" name="role" value="communal" />
          <div class="radio-card-icon">🏘️</div>
          <div class="radio-card-label">Communal</div>
          <div class="radio-card-desc">Gère une commune</div>
        </label>
        <label class="radio-card ${s.role === 'diaspora' ? 'selected' : ''}" onclick="selectRole('diaspora')">
          <input type="radio" name="role" value="diaspora" />
          <div class="radio-card-icon">🌍</div>
          <div class="radio-card-label">Diaspora</div>
          <div class="radio-card-desc">Coordination d'un pays</div>
        </label>
      </div>
    `;
    mFooter.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary btn-sm" onclick="goStep(2)" ${!s.role ? 'disabled' : ''}>Suivant</button>
    `;
  }

  /* ── ÉTAPE 2 : Zone géographique ── */
  function renderStep2() {
    const s = designState;
    mTitle.textContent = 'Étape 2 — Zone géographique';

    if (s.role === 'diaspora') {
      // Continent → Pays
      const continents = Object.keys(CONTINENTS).sort();
      const paysList = s.continent ? (CONTINENTS[s.continent] || []).sort() : [];
      mBody.innerHTML = stepsHtml(2) + `
        <div class="field">
          <label class="field-label">Continent</label>
          <select class="field-select" onchange="onContinentPick(this.value)">
            <option value="">Sélectionner un continent</option>
            ${continents.map(c => `<option value="${c}" ${s.continent === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">Pays</label>
          <select class="field-select" ${!s.continent ? 'disabled' : ''} onchange="designState.pays = this.value">
            <option value="">Sélectionner un pays</option>
            ${paysList.map(p => `<option value="${p}" ${s.pays === p ? 'selected' : ''}>${p}</option>`).join('')}
          </select>
        </div>
      `;
    } else {
      // Sénégal : Région → Département (→ Commune si communal)
      const DATA = window.PASTEF_DATA;
      const regions = DATA.regions['Sénégal'] || [];
      const departements = s.region ? Object.keys(DATA.senegalStructure[s.region] || {}).sort() : [];
      const communes = (s.role === 'communal' && s.departement && s.region)
        ? (DATA.senegalStructure[s.region]?.[s.departement] || [])
        : [];

      mBody.innerHTML = stepsHtml(2) + `
        <div class="field">
          <label class="field-label">Région</label>
          <select class="field-select" onchange="onRegionPick(this.value)">
            <option value="">Sélectionner une région</option>
            ${regions.map(r => `<option value="${r}" ${s.region === r ? 'selected' : ''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">Département</label>
          <select class="field-select" ${!s.region ? 'disabled' : ''} onchange="onDepartementPick(this.value)">
            <option value="">Sélectionner un département</option>
            ${departements.map(d => `<option value="${d}" ${s.departement === d ? 'selected' : ''}>${d}</option>`).join('')}
          </select>
        </div>
        ${s.role === 'communal' ? `
        <div class="field">
          <label class="field-label">Commune</label>
          <select class="field-select" ${!s.departement ? 'disabled' : ''} onchange="designState.commune = this.value">
            <option value="">Sélectionner une commune</option>
            ${communes.map(c => `<option value="${c}" ${s.commune === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        ` : ''}
      `;
    }

    mFooter.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="goStep(1)">Retour</button>
      <button class="btn btn-primary btn-sm" onclick="validateStep2()">Suivant</button>
    `;
  }

  /* ── ÉTAPE 3 : Patriote de la zone ── */
  async function renderStep3() {
    const s = designState;
    mTitle.textContent = 'Étape 3 — Choisir le patriote';
    mBody.innerHTML = stepsHtml(3) + `
      <div style="padding:10px 14px;background:var(--pastef-green-soft);border-radius:var(--radius-sm);font-size:12px;margin-bottom:16px;">
        <strong>Zone sélectionnée :</strong> ${PASTEF.utils.escapeHtml(localisationLabel(s))}
      </div>
      <div id="patrioteBox">
        <div class="empty-search">Chargement des patriotes de cette zone…</div>
      </div>
      ${s.inscrit ? `
        <div style="margin-top:12px;padding:12px;background:var(--pastef-green-soft);border-radius:var(--radius-sm);border:1px solid var(--pastef-green);">
          <div style="font-size:13px;font-weight:600;color:var(--pastef-green-dark);">✓ ${PASTEF.utils.escapeHtml(s.inscrit.prenom)} ${PASTEF.utils.escapeHtml(s.inscrit.nom)}</div>
          <div style="font-size:11px;color:var(--pastef-green);margin-top:2px;">${PASTEF.utils.escapeHtml(s.inscrit.telephone || '—')}</div>
        </div>
      ` : ''}
    `;
    mFooter.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="goStep(2)">Retour</button>
      <button class="btn btn-primary btn-sm" onclick="goStep(4)" ${!s.inscrit ? 'disabled' : ''} id="btnStep3Next">Suivant</button>
    `;

    await chargerPatriotes();
  }

  async function chargerPatriotes() {
    const s = designState;
    const box = document.getElementById('patrioteBox');
    if (!box) return;

    try {
      let query = PASTEF.supabase
        .from('enrolments')
        .select('id, prenom, nom, telephone, date_naissance, region, departement, commune, quartier, pays')
        .order('nom', { ascending: true })
        .limit(500);

      if (s.role === 'diaspora') {
        query = query.ilike('pays', s.pays);
      } else {
        query = query.eq('pays', 'Sénégal').ilike('region', s.region);
      }

      const { data, error } = await query;
      if (error) throw error;

      // Filtrage en mémoire (insensible casse + accents)
      const normalize = v => (v || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

      let filtered = data || [];
      if (s.role === 'communal' && s.commune) {
        const target = normalize(s.commune);
        filtered = filtered.filter(r => normalize(r.commune) === target || normalize(r.quartier) === target);
      } else if (s.role === 'departemental' && s.departement) {
        const targetDept = normalize(s.departement);
        const communesDuDept = (window.PASTEF_DATA.senegalStructure[s.region]?.[s.departement] || []).map(normalize);
        filtered = filtered.filter(r =>
          normalize(r.departement) === targetDept ||
          communesDuDept.includes(normalize(r.commune)) ||
          communesDuDept.includes(normalize(r.quartier))
        );
      }

      patriotesCache = filtered;

      if (!filtered.length) {
        box.innerHTML = '<div class="empty-search">Aucun patriote inscrit dans cette zone. Vérifiez que des patriotes ont bien rempli le formulaire pour cette zone.</div>';
        return;
      }

      box.innerHTML = `
        <label class="field-label">${filtered.length} patriote${filtered.length > 1 ? 's' : ''} trouvé${filtered.length > 1 ? 's' : ''}</label>
        <select class="field-select" onchange="onPatriotePick(this.value)">
          <option value="">— Sélectionner un patriote —</option>
          ${filtered.map(r => {
            const age = PASTEF.utils.computeAge(r.date_naissance);
            return `<option value="${r.id}" ${s.inscrit?.id === r.id ? 'selected' : ''}>
              ${PASTEF.utils.escapeHtml(r.prenom || '')} ${PASTEF.utils.escapeHtml(r.nom || '')} — ${PASTEF.utils.escapeHtml(r.telephone || '—')}${age ? ` (${age} ans)` : ''}
            </option>`;
          }).join('')}
        </select>
      `;
    } catch (err) {
      box.innerHTML = `<div class="empty-search">Erreur : ${PASTEF.utils.escapeHtml(err.message)}</div>`;
    }
  }

  /* ── ÉTAPE 4 : Email + confirmation ── */
  function renderStep4() {
    const s = designState;
    mTitle.textContent = 'Étape 4 — Confirmation';
    mBody.innerHTML = stepsHtml(4) + `
      ${s.error ? `<div class="form-error">${PASTEF.utils.escapeHtml(s.error)}</div>` : ''}
      <div style="padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);margin-bottom:16px;font-size:12px;">
        <div style="font-weight:700;color:var(--ink);margin-bottom:8px;">Récapitulatif</div>
        <div style="display:grid;grid-template-columns:110px 1fr;gap:4px 12px;color:var(--text-muted);">
          <span>Rôle</span><span style="font-weight:600;color:var(--text);">${roleLabel(s.role)}</span>
          <span>Zone</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(localisationLabel(s))}</span>
          <span>Patriote</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(s.inscrit.prenom)} ${PASTEF.utils.escapeHtml(s.inscrit.nom)}</span>
          <span>Téléphone</span><span style="font-weight:600;color:var(--text);">${PASTEF.utils.escapeHtml(s.inscrit.telephone || '—')}</span>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Email du coordinateur</label>
        <input class="field-input" type="email" id="emailCoord" placeholder="prenom.nom@email.com"
          value="${PASTEF.utils.escapeHtml(s.email)}" oninput="designState.email = this.value" />
        <div class="field-hint">Un compte de connexion sera créé et les identifiants envoyés par email</div>
      </div>
    `;
    mFooter.innerHTML = `
      <button class="btn btn-secondary btn-sm" onclick="goStep(3)">Retour</button>
      <button class="btn btn-primary btn-sm" id="btnConfirm" onclick="executeDesignation()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Confirmer la désignation
      </button>
    `;
  }

  /* ── ÉTAPE 5 : Résultat ── */
  function renderStep5() {
    const s = designState;
    const r = s.result;
    mTitle.textContent = 'Coordinateur désigné ✅';

    const emailBanner = r.emailSent
      ? `<div style="background:var(--pastef-green-soft);color:var(--pastef-green-dark);border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:12px;">✅ Email envoyé à ${PASTEF.utils.escapeHtml(r.email)}</div>`
      : `<div style="background:var(--pastef-or-soft);color:var(--pastef-or);border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:12px;">⚠️ Email non envoyé (${PASTEF.utils.escapeHtml(r.emailError || 'erreur inconnue')}) — transmettez les identifiants manuellement.</div>`;

    mBody.innerHTML = emailBanner + `
      <div class="creds-card">
        <div class="creds-icon">✅</div>
        <div class="creds-title">${PASTEF.utils.escapeHtml(r.prenom)} ${PASTEF.utils.escapeHtml(r.nom)} — ${roleLabel(s.role)}</div>
        <div class="creds-row">
          <div><div class="creds-label">Email</div><div class="creds-value">${PASTEF.utils.escapeHtml(r.email)}</div></div>
          <button class="creds-copy" onclick="copyText('${r.email}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <div class="creds-row">
          <div><div class="creds-label">Mot de passe temporaire</div><div class="creds-value">${r.password}</div></div>
          <button class="creds-copy" onclick="copyText('${r.password}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <div class="creds-row">
          <div><div class="creds-label">Zone</div><div class="creds-value" style="font-family:inherit;">${PASTEF.utils.escapeHtml(localisationLabel(s))}</div></div>
        </div>
        <div class="creds-warning">⚠️ Conservez ce mot de passe : il ne sera plus affiché après fermeture.</div>
      </div>
    `;
    mFooter.innerHTML = `<button class="btn btn-primary btn-sm" onclick="closeModal()">Fermer</button>`;
  }

  /* ── NAVIGATION ── */
  function renderStep() {
    const step = designState.step;
    if (step === 1) renderStep1();
    else if (step === 2) renderStep2();
    else if (step === 3) renderStep3();
    else if (step === 4) renderStep4();
    else if (step === 5) renderStep5();
  }

  window.goStep = function (n) {
    designState.step = n;
    renderStep();
  };

  window.selectRole = function (role) {
    designState.role = role;
    renderStep1();
  };

  window.onContinentPick = function (continent) {
    designState.continent = continent;
    designState.pays = '';
    renderStep2();
  };

  window.onRegionPick = function (region) {
    designState.region = region;
    designState.departement = '';
    designState.commune = '';
    renderStep2();
  };

  window.onDepartementPick = function (departement) {
    designState.departement = departement;
    designState.commune = '';
    renderStep2();
  };

  window.onPatriotePick = function (id) {
    const found = patriotesCache.find(p => p.id === id);
    if (!found) return;
    designState.inscrit = found;
    // Activer le bouton Suivant
    const btn = document.getElementById('btnStep3Next');
    if (btn) btn.disabled = false;
    // Afficher la sélection
    renderStep3();
  };

  window.validateStep2 = function () {
    const s = designState;
    if (s.role === 'diaspora' && !s.pays) return alert('Choisissez un pays');
    if (s.role === 'departemental' && !s.departement) return alert('Choisissez une région et un département');
    if (s.role === 'communal' && !s.commune) return alert('Choisissez une région, un département et une commune');
    goStep(3);
  };

  /* ── EXÉCUTION ── */
  window.executeDesignation = async function () {
    const s = designState;
    s.error = '';

    if (!s.email || !s.email.includes('@')) {
      s.error = 'Entrez un email valide';
      renderStep4();
      return;
    }

    const btn = document.getElementById('btnConfirm');
    if (btn) { btn.disabled = true; btn.textContent = 'Création en cours…'; }

    try {
      const { data, error } = await PASTEF.supabase.functions.invoke('create-coordinator', {
        body: {
          email: s.email.trim(),
          role: s.role,
          enrolment_id: s.inscrit.id,
          region: s.region || null,
          departement: s.departement || null,
          commune: s.commune || null,
          pays: s.pays || null,
        },
      });

      if (error) throw error;
      if (data?.error) throw new Error(data.error);

      s.result = data;
      s.step = 5;
      renderStep5();

      allCoordinators = await loadCoordinators();
      applyFilters();
    } catch (err) {
      console.error(err);
      s.error = err.message || 'Erreur lors de la création';
      renderStep4();
    } finally {
      const btnAgain = document.getElementById('btnConfirm');
      if (btnAgain) { btnAgain.disabled = false; btnAgain.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Confirmer la désignation'; }
    }
  };

  /* ── MODAL OPEN/CLOSE ── */
  window.openDesignation = function () {
    initState();
    renderStep();
    overlay.classList.add('open');
  };

  window.closeModal = function () {
    overlay.classList.remove('open');
  };

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  /* ── UTILS ── */
  window.copyText = function (text) {
    navigator.clipboard.writeText(text).then(() => {
      PASTEF.utils.toast('Copié !', '', { color: 'var(--pastef-green)' });
    });
  };

})();
</script>

</body>
</html>
