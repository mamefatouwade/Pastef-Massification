<style>
  /* ============================================
     Sections : Dropdown + Détail
     ============================================ */

  /* Hero sélecteur */
  .selector-card {
    background:
      linear-gradient(120deg, rgba(15,26,20,0.92), rgba(27,124,61,0.88)),
      url('../../assets/couverture.png') center/cover;
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }

  .selector-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(to bottom,
      var(--pastef-or) 0%, var(--pastef-or) 33%,
      var(--pastef-red) 33%, var(--pastef-red) 66%,
      var(--pastef-green-light) 66%, var(--pastef-green-light) 100%);
  }

  .selector-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--pastef-or-light);
    margin-bottom: 8px;
  }

  .selector-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .selector-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 18px;
  }

  .selector-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .selector-field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .selector-select {
    width: 100%;
    height: 44px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-sm);
    padding: 0 36px 0 14px;
    font-size: 14px;
    font-weight: 500;
    appearance: none;
    cursor: pointer;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg fill='none' stroke='white' stroke-width='2' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
  }

  .selector-select:focus {
    outline: none;
    border-color: var(--pastef-or-light);
    background-color: rgba(255,255,255,0.15);
  }

  .selector-select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .selector-select option {
    background: var(--ink);
    color: #fff;
  }

  .selector-btn {
    height: 44px;
    padding: 0 22px;
    background: var(--pastef-or);
    color: var(--ink);
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }

  .selector-btn:hover { background: var(--pastef-or-light); transform: translateY(-1px); }

  @media (max-width: 900px) {
    .selector-row { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 560px) {
    .selector-row { grid-template-columns: 1fr; }
  }

  /* Stats principales d'une section */
  .section-kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .section-kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    position: relative;
  }

  .section-kpi-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .section-kpi-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.6px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .section-kpi-icon {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-green { background: var(--pastef-green-soft); color: var(--pastef-green-dark); }
  .icon-or { background: var(--pastef-or-soft); color: var(--pastef-or); }
  .icon-red { background: var(--pastef-red-soft); color: var(--pastef-red-dark); }
  .icon-ink { background: var(--bg); color: var(--ink); }

  /* Coordinator card */
  .coord-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }

  .coord-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--pastef-or);
    margin-bottom: 14px;
  }

  .coord-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pastef-green), var(--pastef-green-dark));
    color: #fff;
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    box-shadow: var(--shadow-sm);
  }

  .coord-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .coord-fn { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

  .coord-contact {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-light);
    font-size: 12px;
    color: var(--text-muted);
  }

  .coord-contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .coord-empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
  }

  .coord-empty svg { opacity: 0.3; margin-bottom: 8px; }

  /* Membres récents */
  .recent-list {
    display: flex;
    flex-direction: column;
  }

  .recent-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .recent-item:last-child { border-bottom: none; }

  .recent-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pastef-green), var(--pastef-green-dark));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .recent-avatar.female { background: linear-gradient(135deg, var(--pastef-or), #B57607); }

  .recent-name { font-size: 13px; font-weight: 600; }
  .recent-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Pas de sélection */
  .placeholder {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 80px 24px;
    text-align: center;
  }

  .placeholder-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--pastef-green-soft);
    color: var(--pastef-green);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .placeholder-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .placeholder-text {
    font-size: 13px;
    color: var(--text-muted);
    max-width: 360px;
    margin: 0 auto;
  }

  /* Section title */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    width: 4px;
    height: 14px;
    background: var(--pastef-green);
    border-radius: 2px;
  }

  /* Actions header */
  .section-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  /* Chart container */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  .chart-wrap { height: 240px; position: relative; }

  /* Activités placeholder (en attendant la table activites) */
  .info-strip {
    background: var(--pastef-or-soft);
    border-left: 3px solid var(--pastef-or);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--ink);
    display: flex;
    align-items: start;
    gap: 10px;
  }

  .cellule-unofficial {
    font-size: 10px;
    font-style: italic;
    color: var(--text-soft);
    margin-left: 6px;
  }
</style>

<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <header class="topbar" id="topbar"></header>

    <div class="content" id="content">
      <div class="page-loader">
        <div class="spinner"></div>
        Chargement…
      </div>
    </div>
  </div>
</div>

<script src="../../js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="../../shared/supabase-client.js"></script>
<script src="../../shared/utils.js"></script>
<script src="../../shared/auth.js"></script>
<script src="../../shared/sidebar.js"></script>
<script src="../../shared/topbar.js"></script>

<script>
let allMembers = [];
let allCommunesRows = [];   // 🆕 référentiel officiel, depuis la table `communes`
let regroupements = {};     // clé: "region::departement::commune"
let orphanMembers = [];     // 🆕 patriotes du Sénégal qu'on n'a pas pu rattacher précisément

(async function () {
  'use strict';

  const session = await PASTEF.auth.requireAuth(['admin']);
  if (!session) return;

  PASTEF.sidebar.render(session, 'sec-communales');
  PASTEF.topbar.render({
    session,
    title: 'Sections Communales',
    breadcrumb: 'Vue par commune',
  });

  try {
    // 🆕 On charge en parallèle les inscrits ET le référentiel officiel
    // des communes (région → département → commune), pour afficher
    // TOUTES les communes du Sénégal — pas seulement celles qui ont déjà
    // au moins un inscrit.
    const [membersRes, communesRes] = await Promise.all([
      PASTEF.supabase.from(PASTEF.TABLE).select('*').order('created_at', { ascending: false }).limit(5000),
      PASTEF.supabase.from('communes').select('region,departement,commune').eq('active', true),
    ]);

    if (membersRes.error) throw membersRes.error;
    allMembers = membersRes.data || [];

    if (communesRes.error) {
      console.warn('[PASTEF] Table communes indisponible, repli sur regroupement par quartier', communesRes.error);
      allCommunesRows = [];
    } else {
      allCommunesRows = communesRes.data || [];
    }

    buildRegroupements();
    buildPage();
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-title">Erreur de chargement</div>
        <div class="empty-text">${PASTEF.utils.escapeHtml(err.message)}</div>
      </div>
    `;
  }
})();

// ============================================
// 🆕 REGROUPEMENT — basé sur la table `communes` (source de vérité),
// avec repli sur l'ancienne méthode (région + quartier) si la table
// est inaccessible.
// ============================================
function buildRegroupements() {
  regroupements = {};
  orphanMembers = [];

  if (allCommunesRows.length) {
    // 1) Toutes les communes officielles d'abord (même à 0 patriote)
    allCommunesRows.forEach((c) => {
      const key = `${c.region}::${c.departement}::${c.commune}`;
      regroupements[key] = { region: c.region, departement: c.departement, commune: c.commune, members: [] };
    });

    // Index de secours région+commune (pour les inscriptions historiques
    // qui n'ont pas encore de département renseigné)
    const byRegionCommune = {};
    Object.values(regroupements).forEach((r) => {
      const k2 = `${r.region}::${r.commune}`;
      (byRegionCommune[k2] = byRegionCommune[k2] || []).push(r);
    });

    // 2) On rattache chaque patriote à SA commune officielle
    allMembers
      .filter((m) => m.pays === 'Sénégal')
      .forEach((m) => {
        const commune = m.commune || m.quartier;
        if (!m.region || !commune) { orphanMembers.push(m); return; }

        const exactKey = `${m.region}::${m.departement}::${commune}`;
        if (m.departement && regroupements[exactKey]) {
          regroupements[exactKey].members.push(m);
          return;
        }

        const candidates = byRegionCommune[`${m.region}::${commune}`];
        if (candidates && candidates.length === 1) {
          candidates[0].members.push(m);
          return;
        }

        // Nom de commune introuvable dans le référentiel officiel, ou
        // ambigu (existe dans plusieurs départements de la région) —
        // on ne devine pas, on le compte à part.
        orphanMembers.push(m);
      });
  } else {
    // Repli : ancien comportement si `communes` est inaccessible
    allMembers
      .filter((m) => m.pays === 'Sénégal' && m.region && (m.commune || m.quartier))
      .forEach((m) => {
        const commune = m.commune || m.quartier;
        const key = `${m.region}::__::${commune}`;
        if (!regroupements[key]) regroupements[key] = { region: m.region, departement: null, commune, members: [] };
        regroupements[key].members.push(m);
      });
  }
}

// ============================================
// SÉLECTEUR — 3 niveaux : Région → Département → Commune
// ============================================
function buildPage() {
  const regions = [...new Set(Object.values(regroupements).map((r) => r.region))].sort();
  const communesCount = Object.keys(regroupements).length;

  document.getElementById('content').innerHTML = `
    <!-- SÉLECTEUR -->
    <div class="selector-card">
      <div class="selector-eyebrow">Vue communale</div>
      <h1 class="selector-title">Sections communales du Sénégal</h1>
      <p class="selector-sub">
        ${PASTEF.utils.formatNumber(communesCount)} communes officielles recensées
        ${orphanMembers.length ? ` · <span style="color:var(--pastef-or-light)">${orphanMembers.length} patriote(s) non rattaché(s) précisément à une commune</span>` : ''}
        · Sélectionnez une commune pour voir son détail.
      </p>

      <div class="selector-row">
        <div class="selector-field">
          <label>Région</label>
          <select class="selector-select" id="regionFilter">
            <option value="">Toutes régions</option>
            ${regions.map((r) => `<option value="${PASTEF.utils.escapeHtml(r)}">${PASTEF.utils.escapeHtml(r)}</option>`).join('')}
          </select>
        </div>

        <div class="selector-field">
          <label>Département</label>
          <select class="selector-select" id="departementFilter" disabled>
            <option value="">Choisir une région d'abord</option>
          </select>
        </div>

        <div class="selector-field">
          <label>Commune</label>
          <select class="selector-select" id="communeSelect" disabled>
            <option value="">— Choisir une commune —</option>
          </select>
        </div>

        <button class="selector-btn" onclick="showCommune()">
          Voir
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ZONE DE DÉTAIL -->
    <div id="communeDetail">
      <div class="placeholder">
        <div class="placeholder-icon">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
            <path d="M3 7l9-4 9 4"/>
            <path d="M9 22V12h6v10"/>
          </svg>
        </div>
        <div class="placeholder-title">Sélectionnez une commune</div>
        <div class="placeholder-text">Choisissez une région, un département puis une commune dans le menu ci-dessus pour visualiser ses coordinateurs, ses patriotes et ses cellules.</div>
      </div>
    </div>
  `;

  document.getElementById('regionFilter').addEventListener('change', onRegionChange);
  document.getElementById('departementFilter').addEventListener('change', onDepartementChange);
}

function onRegionChange(e) {
  const region = e.target.value;
  const depSel = document.getElementById('departementFilter');
  const comSel = document.getElementById('communeSelect');

  comSel.innerHTML = `<option value="">— Choisir une commune —</option>`;
  comSel.disabled = true;

  if (!region) {
    depSel.innerHTML = `<option value="">Choisir une région d'abord</option>`;
    depSel.disabled = true;
    return;
  }

  const departements = [...new Set(
    Object.values(regroupements).filter((r) => r.region === region).map((r) => r.departement).filter(Boolean)
  )].sort();

  depSel.innerHTML = `<option value="">Tous départements</option>` +
    departements.map((d) => `<option value="${PASTEF.utils.escapeHtml(d)}">${PASTEF.utils.escapeHtml(d)}</option>`).join('');
  depSel.disabled = false;

  populateCommunesForFilter(region, '');
}

function onDepartementChange(e) {
  const region = document.getElementById('regionFilter').value;
  populateCommunesForFilter(region, e.target.value);
}

function populateCommunesForFilter(region, departement) {
  const comSel = document.getElementById('communeSelect');

  const entries = Object.entries(regroupements)
    .filter(([, r]) => (!region || r.region === region) && (!departement || r.departement === departement))
    .sort((a, b) => a[1].commune.localeCompare(b[1].commune));

  comSel.innerHTML = `<option value="">— Choisir une commune —</option>` +
    entries.map(([key, r]) =>
      `<option value="${PASTEF.utils.escapeHtml(key)}">${PASTEF.utils.escapeHtml(r.commune)}${r.members.length ? ` (${r.members.length})` : ''}</option>`
    ).join('');
  comSel.disabled = false;
}

// ============================================
// DÉTAIL D'UNE COMMUNE
// ============================================
async function showCommune() {
  const key = document.getElementById('communeSelect').value;
  if (!key || !regroupements[key]) {
    PASTEF.utils.toast('Choisissez une commune', '', { color: 'var(--pastef-or)' });
    return;
  }

  const data = regroupements[key];
  const members = data.members;
  const stats = computeSectionStats(members);
  const coord = findCoordinator(members);

  document.getElementById('communeDetail').innerHTML = renderCommuneDetail(data, stats, coord);
  renderGenreChart(stats);

  // 🆕 Cellules réellement enregistrées en base pour CETTE commune
  // exactement (pas d'élargissement ici : c'est une vue de reporting,
  // pas un outil d'affectation — on veut voir ce qui existe vraiment,
  // pas des cellules voisines).
  const cellulesDB = await fetchCellulesForCommune(data);
  updateCellulesBlock(cellulesDB, members);
}

async function fetchCellulesForCommune(data) {
  try {
    let q = PASTEF.supabase
      .from('cellules')
      .select('id,nom,type')
      .ilike('pays', 'Sénégal')
      .eq('active', true)
      .eq('commune', data.commune);

    if (data.region) q = q.eq('region', data.region);
    if (data.departement) q = q.eq('departement', data.departement);

    const { data: rows, error } = await q.order('nom', { ascending: true });
    if (error) { console.error('[PASTEF] Erreur chargement cellules commune', error); return []; }
    return rows || [];
  } catch (err) {
    console.error(err);
    return [];
  }
}

function renderCommuneDetail(data, stats, coord) {
  const locLine = [
    data.region ? `Région de ${PASTEF.utils.escapeHtml(data.region)}` : null,
    data.departement ? `Département de ${PASTEF.utils.escapeHtml(data.departement)}` : null,
  ].filter(Boolean).join(' · ');

  return `
    <div class="section-actions">
      <div>
        <h2 style="font-size:20px;font-weight:800;letter-spacing:-0.4px">${PASTEF.utils.escapeHtml(data.commune)}</h2>
        <p style="font-size:13px;color:var(--text-muted);margin-top:2px">${locLine} · ${stats.total} patriote${stats.total > 1 ? 's' : ''}</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="downloadReport('${PASTEF.utils.escapeHtml(data.commune)}', 'excel')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Excel
        </button>
        <button class="btn btn-primary" onclick="downloadReport('${PASTEF.utils.escapeHtml(data.commune)}', 'pdf')">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Rapport PDF
        </button>
      </div>
    </div>

    <!-- KPIs -->
    <div class="section-kpis">
      <div class="section-kpi">
        <div class="section-kpi-icon icon-green">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/></svg>
        </div>
        <div class="section-kpi-label">Patriotes</div>

      </div>
      <div class="section-kpi">

      </div>
      <div class="section-kpi">
        <div class="section-kpi-icon icon-ink">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="section-kpi-label">Cellules</div>
        <div class="section-kpi-value" id="kpiCellules">…</div>
      </div>
      <div class="section-kpi">
        <div class="section-kpi-icon icon-green">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="section-kpi-label">Engagement</div>
        <div class="section-kpi-value">${stats.engagementMoyen}<span style="font-size:14px;color:var(--text-muted)">%</span></div>
      </div>
      <div class="section-kpi">
        <div class="section-kpi-icon icon-red">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
        <div class="section-kpi-label">Sans cellule</div>
        <div class="section-kpi-value">${PASTEF.utils.formatNumber(stats.sansCellule)}</div>
      </div>
    </div>

    <!-- Layout 2 colonnes : Coordinateur + Démographie | Cellules + Récents -->
    <div class="grid grid-1-2">
      <div>
        <div class="coord-card">
          <div class="coord-eyebrow">Coordinateur communal</div>
          ${renderCoordinator(coord)}
        </div>

        <div class="chart-card" style="margin-top:16px">
          <div class="card-header" style="border:none;padding:0;margin-bottom:14px">

      <div>
        <div class="info-strip" style="margin-bottom:16px">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          <span><strong>Activités menées</strong> — Les activités saisies par le coordinateur communal apparaîtront ici. Module en cours d'intégration avec la nouvelle base de données.</span>

        <div class="chart-card">
          <div class="card-header" style="border:none;padding:0;margin-bottom:14px">
            <div>
              <div class="card-title">Cellules de base</div>

          <div id="cellulesListBox">
            <div style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px">Chargement des cellules…</div>
          </div>
        </div>

        <div class="chart-card" style="margin-top:16px">
          <div class="card-header" style="border:none;padding:0;margin-bottom:14px">
            <div>
              <div class="card-title">Derniers patriotes inscrits</div>
              <div class="card-sub">${data.members.length > 6 ? '6 plus récents' : 'Tous'}</div>
            </div>
          </div>
          <div class="recent-list">
            ${data.members.slice(0, 6).map((m) => `
              <div class="recent-item">
                <div class="recent-avatar ${m.sexe === 'Femme' ? 'female' : ''}">${PASTEF.utils.initials(m.prenom, m.nom)}</div>
                <div style="flex:1;min-width:0">
                  <div class="recent-name">${PASTEF.utils.escapeHtml(m.prenom || '')} ${PASTEF.utils.escapeHtml(m.nom || '')}</div>
                  <div class="recent-meta">${PASTEF.utils.escapeHtml(m.profession || '—')} · ${PASTEF.utils.formatDate(m.created_at)}</div>
                </div>
                ${m.cellule ? `<span class="badge badge-green">${PASTEF.utils.escapeHtml(m.cellule)}</span>` : `<span class="badge badge-neutral">Sans</span>`}
              </div>
            `).join('') || '<div style="padding:16px 0;text-align:center;color:var(--text-muted);font-size:13px">Aucun patriote inscrit pour le moment.</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

// 🆕 Met à jour le bloc Cellules une fois la requête Supabase terminée
// (fusionne les cellules officiellement enregistrées avec les mentions
// libres des patriotes, pour ne rien perdre)
function updateCellulesBlock(cellulesDB, members) {
  const kpiEl = document.getElementById('kpiCellules');
  const subEl = document.getElementById('cellulesSub');
  const boxEl = document.getElementById('cellulesListBox');
  if (!boxEl) return; // l'utilisateur a changé de commune entre-temps

  if (kpiEl) kpiEl.textContent = PASTEF.utils.formatNumber(cellulesDB.length);

  const merged = mergeCellules(cellulesDB, members);

  if (subEl) {
    subEl.textContent = `${cellulesDB.length} cellule${cellulesDB.length > 1 ? 's' : ''} enregistrée${cellulesDB.length > 1 ? 's' : ''} en base`;
  }

  boxEl.innerHTML = renderCellulesList(merged);
}

function mergeCellules(cellulesDB, members) {
  const countByName = {};
  members.forEach((m) => { if (m.cellule) countByName[m.cellule] = (countByName[m.cellule] || 0) + 1; });

  const known = new Set();
  const list = cellulesDB.map((c) => {
    known.add(c.nom);
    return { name: c.nom, count: countByName[c.nom] || 0, official: true };
  });

  // Mentions de cellule mentionnées par des patriotes mais absentes de la
  // table `cellules` (texte libre "Autre cellule (préciser)" par ex.) —
  // on les affiche quand même pour ne perdre aucune donnée.
  Object.entries(countByName).forEach(([name, count]) => {
    if (!known.has(name)) list.push({ name, count, official: false });
  });

  list.sort((a, b) => b.count - a.count);
  return list;
}

function findCoordinator(members) {
  // 🆕 Les libellés exacts viennent maintenant de la table fonctions_cellule
  // ("Coordinateur / Coordinatrice", pas juste "Coordinateur")
  return members.find((m) => m.fonction_cellule === 'Coordinateur / Coordinatrice')
      || members.find((m) => m.fonction_cellule?.startsWith('Coordinateur'));
}

function renderCoordinator(coord) {
  if (!coord) {
    return `
      <div class="coord-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <div style="font-weight:600;color:var(--text);margin-bottom:4px">Aucun coordinateur</div>
        <div style="font-size:12px">Aucune personne n'est désignée comme coordinateur dans cette commune.</div>
      </div>
    `;
  }

  return `
    <div class="coord-avatar">${PASTEF.utils.initials(coord.prenom, coord.nom)}</div>
    <div class="coord-name">${PASTEF.utils.escapeHtml(coord.prenom || '')} ${PASTEF.utils.escapeHtml(coord.nom || '')}</div>
    <div class="coord-fn">${PASTEF.utils.escapeHtml(coord.fonction_cellule || 'Coordinateur')}</div>

    <div class="coord-contact">
      <div class="coord-contact-row">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span class="font-mono">${PASTEF.utils.escapeHtml(coord.telephone || '—')}</span>
      </div>
      <div class="coord-contact-row">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <span>${PASTEF.utils.escapeHtml(coord.commune || coord.quartier || coord.region || '—')}</span>
      </div>
    </div>
  `;
}

function renderCellulesList(cellules) {
  if (!cellules.length) {
    return `<div style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px">Aucune cellule recensée dans cette commune.</div>`;
  }

  const max = Math.max(...cellules.map((c) => c.count), 1);

  return `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${cellules.slice(0, 8).map((c) => {
        const pct = Math.round((c.count / max) * 100);
        return `
          <div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span style="font-weight:600">${PASTEF.utils.escapeHtml(c.name)}${!c.official ? '<span class="cellule-unofficial">(non enregistrée)</span>' : ''}</span>
              <span class="text-muted">${c.count} membre${c.count > 1 ? 's' : ''}</span>
            </div>
            <div style="height:6px;background:var(--border-light);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--pastef-green),var(--pastef-green-light));border-radius:3px"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function computeSectionStats(members) {
  const total = members.length;
  const hommes = members.filter((m) => m.sexe === 'Homme').length;
  const femmes = total - hommes;

  const now = new Date();
  const startMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = members.filter((m) => new Date(m.created_at) >= startMonth).length;

  const sansCellule = members.filter((m) => m.appartient_cellule?.toLowerCase() !== 'oui' || !m.cellule).length;

  const eng = members.filter((m) => m.engagement_soutenir && m.engagement_participer && m.engagement_oeuvrer).length;
  const engagementMoyen = total > 0 ? Math.round((eng / total) * 100) : 0;

  return { total, hommes, femmes, thisMonth, sansCellule, engagementMoyen };
}

function renderGenreChart(stats) {
  const ctx = document.getElementById('chartGenre');
  if (!ctx) return;
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Hommes', 'Femmes'],
      datasets: [{
        data: [stats.hommes, stats.femmes],
        backgroundColor: ['#1B7C3D', '#D4900A'],
        borderWidth: 0,
        cutout: '68%',
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 12, weight: 600 }, padding: 12, boxWidth: 10, boxHeight: 10, usePointStyle: true },
        },
      },
    },
  });
}

}
